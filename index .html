<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Rechen-Bär 🧸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky1:#ffe3c2; --sky2:#fff6e9;
    --grass:#8ad96a; --grass-dk:#57b042;
    --sun:#ffd64d;
    --coral:#ff7a6b; --coral-dk:#e85c4c;
    --blue:#3aa6ff; --blue-dk:#1f7fd6;
    --green:#46c46a; --green-dk:#2da352;
    --gold:#ffc23d; --gold-dk:#e7a01c;
    --ink:#43301f; --muted:#a08a76;
    --card:#fffdf8; --pad:#f5efe6; --pad-dk:#e3d6c4;
    --honey:#caa06d; --honey-dk:#a87a4c;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none;}
  html,body{height:100%; margin:0;}
  body{
    font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 50%,#e7fbdc 100%);
    overflow:hidden; touch-action:manipulation;
  }
  .sky-deco{position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;}
  .sun{position:absolute; top:-50px; right:-50px; width:190px; height:190px; border-radius:50%;
       background:radial-gradient(circle at 40% 40%,#fff0a8,var(--sun)); box-shadow:0 0 70px #ffe27a;}
  .cloud{position:absolute; background:#fff; border-radius:50px; opacity:.85;}
  .cloud::before,.cloud::after{content:""; position:absolute; background:#fff; border-radius:50%;}
  .c1{width:140px;height:40px;top:90px;left:-40px; animation:drift 44s linear infinite;}
  .c1::before{width:58px;height:58px;top:-24px;left:26px;}
  .c1::after{width:44px;height:44px;top:-16px;left:74px;}
  .c2{width:104px;height:30px;top:200px;right:-30px; animation:drift2 54s linear infinite;}
  .c2::before{width:44px;height:44px;top:-18px;left:20px;}
  .c2::after{width:34px;height:34px;top:-12px;left:56px;}
  @keyframes drift{from{transform:translateX(-80px)}to{transform:translateX(112vw)}}
  @keyframes drift2{from{transform:translateX(80px)}to{transform:translateX(-112vw)}}
  .grass{position:fixed; left:0; right:0; bottom:0; height:84px; z-index:0;
    background:linear-gradient(180deg,var(--grass),var(--grass-dk)); border-radius:50% 50% 0 0 / 32px 32px 0 0;}

  .wrap{position:relative; z-index:1; height:100%; display:flex; flex-direction:column;
        align-items:center; justify-content:center; padding:18px; padding-bottom:92px; overflow-y:auto;}
  .card{width:100%; max-width:600px; background:var(--card); border-radius:38px;
        box-shadow:0 16px 0 rgba(67,48,31,.08), 0 28px 46px rgba(67,48,31,.18);
        padding:26px 24px; text-align:center;}

  h1{font-family:'Fredoka',sans-serif; font-weight:700; margin:6px 0 2px; font-size:clamp(34px,6vw,46px);}
  .sub{color:var(--muted); font-weight:700; margin:0 0 16px; font-size:clamp(16px,2.4vw,19px);}

  .teddy{width:clamp(120px,30vw,168px); height:auto; display:block; margin:0 auto;}
  .teddy.sm{width:clamp(74px,16vw,92px);}
  .mascot{display:inline-block; transition:transform .2s;}
  .bubble{display:inline-block; background:var(--pad); color:var(--ink); font-weight:800;
          border-radius:22px; padding:12px 20px; margin:10px auto 4px; font-size:clamp(17px,2.6vw,21px); max-width:94%;
          box-shadow:inset 0 -4px 0 var(--pad-dk);}

  .name-in{width:100%; font-family:'Fredoka',sans-serif; font-size:clamp(19px,2.8vw,23px); text-align:center;
    padding:14px; border-radius:20px; border:3px solid var(--pad-dk); background:var(--pad);
    color:var(--ink); margin:4px 0 16px; outline:none;}
  .name-in:focus{border-color:var(--honey);}

  .level{display:flex; gap:8px; background:var(--pad); border-radius:22px; padding:8px; margin:8px 0 14px;}
  .level button{flex:1; border:none; cursor:pointer; border-radius:16px; padding:14px 6px; font-family:'Fredoka',sans-serif;
    font-weight:600; font-size:clamp(16px,2.4vw,19px); color:var(--muted); background:transparent;}
  .level button.on{background:#fff; color:var(--ink); box-shadow:0 4px 10px rgba(67,48,31,.16);}

  .modes{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .mode{position:relative; border:none; cursor:pointer; border-radius:26px; padding:20px 10px 16px;
        background:var(--pad); box-shadow:inset 0 -6px 0 var(--pad-dk); transition:transform .08s;}
  .mode:active{transform:scale(.96);}
  .mode .ic{font-size:clamp(34px,6vw,44px); display:block; line-height:1;}
  .mode .lbl{font-family:'Fredoka',sans-serif; font-weight:600; font-size:clamp(17px,2.6vw,21px); color:var(--ink); margin-top:6px;}
  .mode.wide{grid-column:1 / -1;}
  .mode.feat{background:linear-gradient(120deg,#d3ecff,#aed8ff); box-shadow:inset 0 -6px 0 #8cc4f5;}
  .mode.pass{background:linear-gradient(120deg,#ffe7a8,#ffd152); box-shadow:inset 0 -6px 0 #e7b32f;}
  .mode.mix{background:linear-gradient(120deg,#ffe7bf,#ffd79a); box-shadow:inset 0 -6px 0 #f0c479;}

  .btn{font-family:'Fredoka',sans-serif; font-weight:600; border:none; cursor:pointer; color:#fff;
       border-radius:24px; font-size:clamp(19px,2.8vw,23px); padding:17px 18px; width:100%; transition:transform .08s,box-shadow .08s; touch-action:manipulation;}
  .btn:active{transform:translateY(5px);}
  .btn-blue{background:var(--blue); box-shadow:0 7px 0 var(--blue-dk);} .btn-blue:active{box-shadow:0 2px 0 var(--blue-dk);}
  .btn-green{background:var(--green); box-shadow:0 7px 0 var(--green-dk);} .btn-green:active{box-shadow:0 2px 0 var(--green-dk);}
  .ghost{background:#fff; color:var(--blue-dk); box-shadow:0 7px 0 var(--pad-dk);} .ghost:active{box-shadow:0 2px 0 var(--pad-dk);}

  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
  .iconbtn{background:var(--pad); border:none; border-radius:18px; width:54px; height:54px; font-size:25px;
    cursor:pointer; box-shadow:inset 0 -4px 0 var(--pad-dk);}
  .progress{font-family:'Fredoka',sans-serif; font-weight:600; color:var(--muted); font-size:clamp(16px,2.4vw,19px);}
  .stars{font-size:clamp(20px,3.2vw,26px); letter-spacing:2px; margin:4px 0 8px; min-height:28px;}
  .star-off{opacity:.26;}

  .equation{font-family:'Fredoka',sans-serif; font-weight:600; font-size:clamp(38px,9.5vw,58px);
    display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:8px; margin:16px 0;}
  .equation.asblock{display:block;}
  .slot{min-width:96px; height:76px; border-radius:20px; background:var(--pad);
    border:4px dashed var(--pad-dk); display:inline-flex; align-items:center; justify-content:center; padding:0 10px;}
  .slot.empty{color:var(--muted);}
  .slot.good{background:#dff7e4; border-color:var(--green); border-style:solid; color:var(--green-dk);}
  .slot.bad{background:#ffe2dd; border-color:var(--coral); border-style:solid; color:var(--coral-dk);}
  .caret{display:inline-block; width:4px; height:42px; background:var(--honey); margin-left:2px; border-radius:2px; animation:blink 1s step-end infinite;}
  @keyframes blink{50%{opacity:0}}

  /* Schritt-Panel */
  .worktask{font-family:'Fredoka',sans-serif; font-weight:700; font-size:clamp(34px,9vw,52px); margin:10px 0 10px;}
  .worktask .q{color:var(--honey-dk);}
  .workstep{display:flex; flex-direction:column; gap:2px; background:var(--pad); border-radius:22px; padding:14px 16px; margin:12px 0; opacity:.4; transition:opacity .2s, box-shadow .2s, background .2s;}
  .workstep.active{opacity:1; background:#eaf6ff; box-shadow:inset 0 0 0 4px var(--blue);}
  .workstep.done{opacity:1; background:#e7f8ec;}
  .workstep .shead{display:flex; align-items:center; gap:10px; font-weight:800; font-size:clamp(14px,2.2vw,17px); color:var(--muted);}
  .workstep .badge{width:34px;height:34px;border-radius:50%;background:var(--honey);color:#fff;display:inline-flex;
    align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-weight:700;font-size:19px;flex:none;}
  .workstep.active .badge{background:var(--blue);}
  .workstep.done .badge{background:var(--green);}
  .workstep .calc{font-family:'Fredoka',sans-serif; font-weight:600; font-size:clamp(30px,7.5vw,42px); text-align:center; margin-top:5px;}
  .slot.mini{min-width:78px; height:62px; font-size:clamp(28px,7vw,40px); vertical-align:middle;}
  .workresult{font-family:'Fredoka',sans-serif; font-weight:700; font-size:clamp(30px,7.5vw,42px); color:var(--green-dk); margin-top:16px;}

  .tip{background:#fff6da; color:#7a5b14; border-radius:20px; padding:14px 16px; font-weight:700;
    font-size:clamp(16px,2.4vw,19px); margin:8px 0 2px; box-shadow:inset 0 -4px 0 #f0e2ac; display:none;}

  .keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:16px;}
  .key{font-family:'Fredoka',sans-serif; font-weight:600; font-size:clamp(28px,5vw,36px); border:none; cursor:pointer;
    border-radius:22px; padding:20px 0; background:#fff; color:var(--ink);
    box-shadow:0 6px 0 var(--pad-dk), 0 8px 12px rgba(67,48,31,.08); transition:transform .07s,box-shadow .07s;}
  .key:active{transform:translateY(5px); box-shadow:0 1px 0 var(--pad-dk);}
  .key.del{background:#fff0ee; color:var(--coral-dk); box-shadow:0 6px 0 #f3cdc7;}
  .key.ok{background:var(--green); color:#fff; box-shadow:0 6px 0 var(--green-dk);} .key.ok:active{box-shadow:0 1px 0 var(--green-dk);}

  .row-actions{display:flex; gap:12px; margin-top:16px;}
  .hide{display:none !important;}
  .shake{animation:shake .4s;} @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
  .hop{animation:hop .55s;} @keyframes hop{0%,100%{transform:translateY(0)}30%{transform:translateY(-26px)}55%{transform:translateY(0)}70%{transform:translateY(-10px)}}

  .confetti{position:fixed; top:-40px; z-index:5; font-size:28px; pointer-events:none; animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(112vh) rotate(360deg); opacity:.9;}}
  .score-big{font-family:'Fredoka',sans-serif; font-weight:700; font-size:clamp(28px,5vw,38px); margin:8px 0;}

  /* Tanzende Tiere */
  .dancers{position:fixed; left:0; right:0; bottom:96px; z-index:6; display:flex; gap:clamp(8px,3vw,20px);
    justify-content:center; pointer-events:none; opacity:0; transition:opacity .4s;}
  .dancer{font-size:clamp(40px,9vw,58px); filter:drop-shadow(0 6px 6px rgba(0,0,0,.15));}
  .mv1{animation:dnc-bounce .5s ease-in-out infinite;}
  .mv2{animation:dnc-spin .9s linear infinite;}
  .mv3{animation:dnc-wobble .5s ease-in-out infinite;}
  .mv4{animation:dnc-jump .6s ease-in-out infinite;}
  .mv5{animation:dnc-shimmy .35s ease-in-out infinite;}
  .mv6{animation:dnc-pulse .5s ease-in-out infinite;}
  @keyframes dnc-bounce{0%,100%{transform:translateY(0) rotate(-7deg)}50%{transform:translateY(-22px) rotate(7deg)}}
  @keyframes dnc-spin{0%{transform:rotate(0) scale(1)}50%{transform:rotate(180deg) scale(1.15)}100%{transform:rotate(360deg) scale(1)}}
  @keyframes dnc-wobble{0%,100%{transform:rotate(-16deg)}50%{transform:rotate(16deg)}}
  @keyframes dnc-jump{0%,100%{transform:translateY(0) scale(1)}40%{transform:translateY(-28px) scale(1.12)}65%{transform:translateY(-8px) scale(1)}}
  @keyframes dnc-shimmy{0%,100%{transform:translateX(-9px) rotate(-5deg)}50%{transform:translateX(9px) rotate(5deg)}}
  @keyframes dnc-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}

  /* Teilen-Modus */
  .shareInstr{font-weight:800; color:var(--ink); font-size:clamp(17px,2.8vw,21px); margin:8px 0 4px;}
  .bignum{font-family:'Fredoka',sans-serif; font-weight:700; font-size:clamp(40px,11vw,64px); color:var(--honey-dk); line-height:1;}
  .basket{background:#fff5e2; border-radius:24px; padding:14px; margin:10px 0; box-shadow:inset 0 -5px 0 #f1dcb6; min-height:74px;
    display:flex; align-items:center; justify-content:center;}
  .chips{display:flex; flex-wrap:wrap; gap:7px; justify-content:center; align-content:center;}
  .chip{font-size:clamp(26px,6vw,36px); line-height:1; animation:pop .3s ease-out;}
  @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.25)}100%{transform:scale(1)}}
  .plates{display:flex; gap:14px; margin:8px 0;}
  .plate{flex:1; background:var(--pad); border-radius:24px; padding:12px 8px 14px; box-shadow:inset 0 -5px 0 var(--pad-dk);
    display:flex; flex-direction:column; align-items:center; gap:6px; transition:box-shadow .2s, background .2s;}
  .plate.more{background:#fff1c4; box-shadow:inset 0 0 0 4px var(--gold);}
  .plate .animal{font-size:clamp(44px,11vw,64px); line-height:1;}
  .plate .pchips{min-height:40px; display:flex; flex-wrap:wrap; gap:5px; justify-content:center;}
  .plate .pcount{font-family:'Fredoka',sans-serif; font-weight:700; font-size:clamp(22px,4.5vw,30px);}
  .plate .ptag{font-size:13px; font-weight:800; color:var(--gold-dk);}
  .shareConcl{background:#e7f8ec; border-radius:22px; padding:16px; margin:10px 0 2px; box-shadow:inset 0 -5px 0 #c4ecd0;}
  .shareConcl .big{font-family:'Fredoka',sans-serif; font-weight:700; font-size:clamp(26px,6vw,36px); color:var(--green-dk);}
  .shareConcl .reg{font-weight:800; color:var(--ink); font-size:clamp(16px,2.6vw,19px); margin-top:6px;}
  .shareAns{display:flex; align-items:center; justify-content:center; gap:8px; font-family:'Fredoka',sans-serif;
    font-weight:600; font-size:clamp(26px,6vw,38px); margin:10px 0;}

  /* Gerade/Ungerade Wahl */
  .euChoice{display:flex; gap:14px; margin:14px 0 6px;}
  .euBtn{flex:1; font-family:'Fredoka',sans-serif; font-weight:600; border:none; cursor:pointer; color:#fff;
    border-radius:24px; font-size:clamp(20px,3.4vw,26px); padding:22px 10px; transition:transform .08s,box-shadow .08s;}
  .euBtn:active{transform:translateY(5px);}
  .euBtn.even{background:#5aa9ff; box-shadow:0 7px 0 #2f7fd6;} .euBtn.even:active{box-shadow:0 2px 0 #2f7fd6;}
  .euBtn.odd{background:#ff9a5a; box-shadow:0 7px 0 #e0772f;} .euBtn.odd:active{box-shadow:0 2px 0 #e0772f;}
  .digHi{display:inline-block; background:var(--gold); color:#fff; border-radius:10px; padding:0 8px; margin-left:2px;}

  /* Punkte-Modus (Verdoppeln/Halbieren) */
  .dotbox{background:#fff5e2; border-radius:22px; padding:14px 12px; margin:8px 0; box-shadow:inset 0 -5px 0 #f1dcb6; min-height:60px;}
  .dotbox.two{display:flex; flex-direction:column; gap:10px;}
  .dotrow{display:flex; flex-wrap:wrap; gap:clamp(6px,2vw,10px); justify-content:center; align-content:center;}
  .dotrow.ghost{opacity:.18;}
  .dot{font-size:clamp(28px,7vw,42px); line-height:1; animation:pop .3s ease-out;}
  .rowtag{font-weight:800; color:var(--muted); font-size:13px; margin-bottom:2px;}
  .pluscenter{font-family:'Fredoka',sans-serif; font-weight:700; color:var(--honey-dk); font-size:clamp(22px,5vw,30px); text-align:center;}
  .dotAns{display:flex; align-items:center; justify-content:center; gap:8px; font-family:'Fredoka',sans-serif;
    font-weight:600; font-size:clamp(26px,6vw,38px); margin:12px 0;}

  /* Tabelle */
  .rtable{border-collapse:separate; border-spacing:8px; margin:10px auto;}
  .rtable th{font-family:'Fredoka',sans-serif; font-weight:600; background:#fbeede; color:var(--ink);
    border-radius:16px; min-width:62px; height:60px; font-size:clamp(20px,3.4vw,24px);}
  .rtable th.corner{background:var(--honey); color:#fff; font-size:clamp(24px,4vw,30px);}
  .cell{min-width:72px; height:62px; border-radius:16px; border:4px dashed var(--pad-dk); background:var(--pad);
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:clamp(22px,4vw,28px); color:var(--muted); cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center; padding:0 8px;}
  .cell.active{border-style:solid; border-color:var(--blue); background:#eaf6ff; color:var(--ink);}
  .cell.solved{border-style:solid; border-color:var(--green); background:#dff7e4; color:var(--green-dk); cursor:default;}

  /* Zahlenhaus */
  .house{margin:4px auto 10px;}
  .house .top{width:104px;height:62px;margin:0 auto;background:#fff2c9;border-radius:16px;
    display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-weight:600;
    font-size:clamp(26px,5vw,32px);box-shadow:inset 0 -5px 0 #f0d98a;}
  .house .roof{font-size:14px;color:var(--muted);font-weight:800;margin-bottom:4px;}
  .house .bottom{display:flex;gap:14px;margin-top:10px;justify-content:center;}
  .house .part{width:104px;height:58px;background:#fde3dc;border-radius:16px;display:flex;align-items:center;
    justify-content:center;font-family:'Fredoka',sans-serif;font-weight:600;font-size:clamp(24px,4.5vw,30px);box-shadow:inset 0 -5px 0 #f3c3b8;}
  .feq{display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Fredoka',sans-serif;
    font-weight:600;font-size:clamp(26px,5vw,34px);margin:9px 0;}

  /* Einmaleins-Pass */
  .passgrid{display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-top:8px;}
  .passrow{position:relative; border:none; cursor:pointer; border-radius:22px; padding:16px 12px;
    background:var(--pad); box-shadow:inset 0 -5px 0 var(--pad-dk); transition:transform .08s; text-align:left;
    display:flex; align-items:center; gap:12px;}
  .passrow:active{transform:scale(.97);}
  .passrow.done{background:linear-gradient(120deg,#fff1c4,#ffe49a); box-shadow:inset 0 -5px 0 #f0cf6a;}
  .passrow .num{font-family:'Fredoka',sans-serif; font-weight:700; font-size:clamp(22px,4vw,28px); color:var(--ink);
    background:#fff; border-radius:14px; width:54px; height:54px; display:flex; align-items:center; justify-content:center; flex:none;
    box-shadow:0 3px 0 var(--pad-dk);}
  .passrow.done .num{background:var(--gold); color:#fff; box-shadow:0 3px 0 var(--gold-dk);}
  .passrow .meta{display:flex; flex-direction:column; line-height:1.15;}
  .passrow .meta .t{font-family:'Fredoka',sans-serif; font-weight:600; font-size:clamp(16px,2.6vw,19px);}
  .passrow .meta .s{font-size:13px; color:var(--muted); font-weight:700;}
  .passrow .stamp{position:absolute; right:12px; top:50%; transform:translateY(-50%) rotate(-12deg); font-size:30px;}
  .passhint{font-weight:700; color:var(--muted); font-size:clamp(15px,2.4vw,18px); margin:6px 0 4px;}
  .passbadge{font-size:clamp(56px,16vw,84px); line-height:1.1;}
  .minilink{background:none;border:none;color:var(--muted);font-weight:800;font-size:14px;cursor:pointer;text-decoration:underline;margin-top:12px;}

  @media (min-width:760px){
    .card{max-width:720px; padding:34px 30px;}
    .modes{gap:16px;}
    .passgrid{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>
  <div class="sky-deco"><div class="sun"></div><div class="cloud c1"></div><div class="cloud c2"></div></div>
  <div class="grass"></div>

  <div class="wrap">

    <!-- ===== MENÜ ===== -->
    <div id="screen-menu" class="card">
      <div class="mascot" id="menuTeddy"></div>
      <h1>Rechen-Bär</h1>
      <p class="sub">Üben macht stark – los geht's!</p>

      <input id="nameInput" class="name-in" maxlength="14" placeholder="Wie heißt du? (kann leer bleiben)">

      <div class="level">
        <button id="lvl1" class="on" onclick="setLevel(1)">😊 Leicht</button>
        <button id="lvl2" onclick="setLevel(2)">🙂 Mittel</button>
        <button id="lvl3" onclick="setLevel(3)">💪 Schwer</button>
      </div>

      <div class="modes">
        <button class="mode" onclick="pickMode('plus')"><span class="ic">➕</span><span class="lbl">Plus</span></button>
        <button class="mode" onclick="pickMode('minus')"><span class="ic">➖</span><span class="lbl">Minus</span></button>
        <button class="mode" onclick="pickMode('mal')"><span class="ic">✖️</span><span class="lbl">Malnehmen</span></button>

<script>
/* ===================== Süßer Teddy (SVG) ===================== */
function teddy(mood){
  mood = mood||'idle';
  var earOuter='#cda878', earInner='#f7c9c0', fur='#d9ac74', furLt='#ecd0a4',
      belly='#f6e3c3', nose='#5a3d28', cheek='#ff9d92', ribbon='#e6543c', ribbonDk='#c63f2c';
  // Körper, Füße, Arme
  var feet='<ellipse cx="82" cy="214" rx="20" ry="14" fill="'+fur+'"/><ellipse cx="82" cy="216" rx="11" ry="7" fill="'+belly+'"/>'
          +'<ellipse cx="138" cy="214" rx="20" ry="14" fill="'+fur+'"/><ellipse cx="138" cy="216" rx="11" ry="7" fill="'+belly+'"/>';
  var arms='<ellipse cx="56" cy="176" rx="17" ry="22" fill="'+fur+'"/><ellipse cx="164" cy="176" rx="17" ry="22" fill="'+fur+'"/>';
  var body='<ellipse cx="110" cy="182" rx="54" ry="44" fill="'+fur+'"/><ellipse cx="110" cy="188" rx="34" ry="32" fill="'+belly+'"/>';
  // Ohren
  var ears='<circle cx="64" cy="48" r="27" fill="'+earOuter+'"/><circle cx="64" cy="48" r="14" fill="'+earInner+'"/>'
          +'<circle cx="156" cy="48" r="27" fill="'+earOuter+'"/><circle cx="156" cy="48" r="14" fill="'+earInner+'"/>';
  var button='<circle cx="55" cy="40" r="5.5" fill="#d3d7dc" stroke="#9aa0a8" stroke-width="1.6"/><circle cx="55" cy="40" r="1.8" fill="#9aa0a8"/>';
  // Kopf
  var head='<circle cx="110" cy="104" r="66" fill="'+fur+'"/><ellipse cx="110" cy="86" rx="48" ry="32" fill="'+furLt+'" opacity="0.55"/>';
  var muzzle='<ellipse cx="110" cy="124" rx="38" ry="29" fill="'+belly+'"/>';
  var cheeks='<ellipse cx="68" cy="120" rx="13" ry="9" fill="'+cheek+'" opacity="0.55"/><ellipse cx="152" cy="120" rx="13" ry="9" fill="'+cheek+'" opacity="0.55"/>';
  var noseEl='<ellipse cx="110" cy="110" rx="11" ry="8.5" fill="'+nose+'"/><ellipse cx="106" cy="107" rx="3" ry="2" fill="#876a4f"/>';

  // Augen je nach Stimmung
  var eyes, mouth, extra='';
  var bigEye=function(cx){return '<circle cx="'+cx+'" cy="92" r="11" fill="#2e2016"/>'
    +'<circle cx="'+(cx+3.4)+'" cy="88" r="3.6" fill="#fff"/><circle cx="'+(cx-3)+'" cy="95" r="1.8" fill="#fff" opacity="0.8"/>';};
  if(mood==='happy'){
    eyes='<path d="M62 92 q11 -13 22 0" stroke="#2e2016" stroke-width="5" fill="none" stroke-linecap="round"/>'
        +'<path d="M136 92 q11 -13 22 0" stroke="#2e2016" stroke-width="5" fill="none" stroke-linecap="round"/>';
    mouth='<path d="M110 116 V122" stroke="'+nose+'" stroke-width="4" fill="none" stroke-linecap="round"/>'
         +'<path d="M88 126 Q110 150 132 126 Q110 138 88 126 Z" fill="#c2543c"/><path d="M97 131 Q110 139 123 131" fill="#ff9bb5"/>';
    cheeks='<ellipse cx="66" cy="120" rx="15" ry="11" fill="'+cheek+'" opacity="0.7"/><ellipse cx="154" cy="120" rx="15" ry="11" fill="'+cheek+'" opacity="0.7"/>';
  } else if(mood==='think'){
    eyes='<circle cx="73" cy="90" r="11" fill="#2e2016"/><circle cx="76" cy="86" r="3.6" fill="#fff"/>'
        +'<circle cx="147" cy="90" r="11" fill="#2e2016"/><circle cx="150" cy="86" r="3.6" fill="#fff"/>';
    mouth='<path d="M110 116 V122" stroke="'+nose+'" stroke-width="4" fill="none" stroke-linecap="round"/>'
         +'<ellipse cx="110" cy="132" rx="7" ry="6" fill="none" stroke="'+nose+'" stroke-width="3.5"/>';
    extra='<path d="M170 78 q-7 11 0 17 q7 -6 0 -17 Z" fill="#86d6ff" stroke="#54bdec" stroke-width="1.2"/>';
  } else if(mood==='kind'){
    eyes=bigEye(73)+bigEye(147);
    mouth='<path d="M110 116 V123" stroke="'+nose+'" stroke-width="4" fill="none" stroke-linecap="round"/>'
         +'<path d="M92 128 q18 12 36 0" stroke="'+nose+'" stroke-width="4" fill="none" stroke-linecap="round"/>';
  } else { // idle
    eyes=bigEye(73)+bigEye(147);
    mouth='<path d="M110 116 V123" stroke="'+nose+'" stroke-width="4" fill="none" stroke-linecap="round"/>'
         +'<path d="M97 127 q13 9 26 0" stroke="'+nose+'" stroke-width="4" fill="none" stroke-linecap="round"/>';
  }
  // Mascherl
  var ribbonEl='<path d="M110 162 L80 150 L80 180 Z" fill="'+ribbon+'"/><path d="M110 162 L140 150 L140 180 Z" fill="'+ribbon+'"/>'
              +'<circle cx="110" cy="163" r="9" fill="'+ribbonDk+'"/>';

  return '<svg class="teddy" viewBox="0 0 220 232" xmlns="http://www.w3.org/2000/svg">'
    + feet + arms + body + ears + button + head + muzzle + cheeks + noseEl + eyes + mouth + extra + ribbonEl + '</svg>';
}

/* ===================== Zustand ===================== */
var ROUND=10;
var state={mode:'plus',level:1,name:'',soundOn:true,idx:0,score:0,attempts:0,answer:'',current:null,locked:false,passRow:0};
var board=null;
var passStamps=loadPass();

function rnd(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function sampleDistinct(arr,k){var c=arr.slice(),out=[];while(out.length<k&&c.length){out.push(c.splice(Math.floor(Math.random()*c.length),1)[0]);}return out;}
function rangeList(a,b){var o=[];for(var i=a;i<=b;i++)o.push(i);return o;}
function show(id){document.getElementById(id).classList.remove('hide');}
function hideEl(id){document.getElementById(id).classList.add('hide');}

/* ===================== Pass speichern ===================== */
function loadPass(){ try{var s=localStorage.getItem('rb_pass'); return s?JSON.parse(s):{};}catch(e){return {};} }
function savePass(){ try{localStorage.setItem('rb_pass',JSON.stringify(passStamps));}catch(e){} }
function resetPass(){ passStamps={}; savePass(); renderPassGrid(); setMascotEl('passTeddy','idle'); }

/* ===================== Ton ===================== */
var actx=null;
function beep(freqs,dur){
  if(!state.soundOn)return;
  try{
    if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();
    var t=actx.currentTime;
    freqs.forEach(function(f,i){
      var o=actx.createOscillator(),g=actx.createGain();
      o.type='sine'; o.frequency.value=f; o.connect(g); g.connect(actx.destination);
      var st=t+i*0.11;
      g.gain.setValueAtTime(0.0001,st);
      g.gain.exponentialRampToValueAtTime(0.25,st+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,st+dur);
      o.start(st); o.stop(st+dur+0.02);
    });
  }catch(e){}
}
function sndGood(){beep([660,880],0.18);}
function sndWin(){beep([523,659,784,1046],0.2);}
function sndOops(){beep([300,230],0.22);}
function toggleSound(){
  state.soundOn=!state.soundOn;
  var ic=state.soundOn?'🔊':'🔇';
  ['soundToggle','soundToggle2','soundToggle3','soundToggle4'].forEach(function(id){var e=document.getElementById(id); if(e)e.textContent=ic;});
  if(state.soundOn)sndGood();
}
function setLevel(n){state.level=n;[1,2,3].forEach(function(i){document.getElementById('lvl'+i).classList.toggle('on',i===n);});}
function ensureAudio(){ if(actx&&actx.state==='suspended')actx.resume(); if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}} }

/* ===================== Tipps ===================== */
function tipPlus(a,b,ans){var bT=Math.floor(b/10)*10,bO=b%10;return bO===0?('Tipp: '+a+' + '+bT+' = '+ans+'.'):('Tipp: '+a+' + '+bT+' = '+(a+bT)+', dann + '+bO+' = '+ans+'.');}
function tipMinus(a,b,ans){var bT=Math.floor(b/10)*10,bO=b%10;return bO===0?('Tipp: '+a+' − '+bT+' = '+ans+'.'):('Tipp: '+a+' − '+bT+' = '+(a-bT)+', dann − '+bO+' = '+ans+'.');}
function tipMal(n,m,ans){return 'Tipp: '+n+' · '+m+' heißt '+n+', '+m+'-mal. Zähle in '+n+'er-Schritten: … = '+ans+'.';}

/* ===================== Aufgaben (Spiel-Modus) ===================== */
function genQuestion(mode){
  var L=state.level,t=0;
  if(mode==='plus'){
    if(L===1){ while(t++<500){var a=rnd(2,12),b=rnd(1,7); if(a+b>20)continue; if((a%10)+(b%10)>=10)continue; var ans=a+b; return{left:a+' + '+b+' = ',right:'',answer:ans,tip:tipPlus(a,b,ans)};} }
    if(L===2){ while(t++<500){var a=rnd(10,42),b=rnd(5,28); if(a+b>70)continue; var ans=a+b; return{left:a+' + '+b+' = ',right:'',answer:ans,tip:tipPlus(a,b,ans)};} }
    while(t++<600){var a=rnd(15,69),b=rnd(13,49); if(a+b>100)continue; if((a%10)+(b%10)<10)continue; var ans=a+b; return{left:a+' + '+b+' = ',right:'',answer:ans,tip:tipPlus(a,b,ans)};}
  }
  if(mode==='minus'){
    if(L===1){ while(t++<500){var a=rnd(6,20),b=rnd(1,9); if(b>=a)continue; if((a%10)<(b%10))continue; var ans=a-b; if(ans<1)continue; return{left:a+' − '+b+' = ',right:'',answer:ans,tip:tipMinus(a,b,ans)};} }
    if(L===2){ while(t++<500){var a=rnd(20,70),b=rnd(6,40); if(b>=a)continue; var ans=a-b; if(ans<1)continue; return{left:a+' − '+b+' = ',right:'',answer:ans,tip:tipMinus(a,b,ans)};} }
    while(t++<600){var a=rnd(30,100),b=rnd(13,a-1); if((a%10)>=(b%10))continue; var ans=a-b; if(ans<1)continue; return{left:a+' − '+b+' = ',right:'',answer:ans,tip:tipMinus(a,b,ans)};}
  }
  if(mode==='mal'){
    var bases,m;
    if(L===1){ bases=[1,2,5,10]; m=rnd(1,5); }
    else if(L===2){ bases=[2,3,4,5,10]; m=rnd(2,10); }
    else { bases=[3,4,6,7,8,9]; m=rnd(2,10); }
    var n=pick(bases),ans=n*m;
    return{left:n+' · '+m+' = ',right:'',answer:ans,tip:tipMal(n,m,ans)};
  }
  if(mode==='fehlt'){
    var kind=pick(['add','sub1','sub2']);
    var xr=(L===1?[1,5]:(L===2?[3,15]:[11,40]));
    var base=(L===1?[3,15]:(L===2?[10,55]:[10,60]));
    if(kind==='add'){while(t++<500){var a=rnd(base[0],base[1]),x=rnd(xr[0],xr[1]),c=a+x;if(c>(L===1?20:100))continue;return{left:a+' + ',right:' = '+c,answer:x,tip:'Tipp: Von '+a+' bis '+c+': '+c+' − '+a+' = '+x+'.'};}}
    else if(kind==='sub1'){while(t++<500){var c=rnd((L===1?8:30),(L===1?20:100)),x=rnd(xr[0],xr[1]),a=c-x;if(a<1)continue;return{left:c+' − ',right:' = '+a,answer:x,tip:'Tipp: '+c+' − '+a+' = '+x+'.'};}}
    else{while(t++<500){var b=rnd(xr[0],xr[1]),a=rnd(base[0],base[1]),x=a+b;if(x>(L===1?20:100))continue;return{left:'',right:' − '+b+' = '+a,answer:x,tip:'Tipp: '+a+' + '+b+' = '+x+'.'};}}
  }
  var fa=rnd(2,9),fb=rnd(2,9);return{left:fa+' + '+fb+' = ',right:'',answer:fa+fb,tip:tipPlus(fa,fb,fa+fb)};
}

/* ===================== Schritt für Schritt ===================== */
function genSchritt(){
  var L=state.level, op=pick(['+','-']), t=0, a, b;
  if(op==='+'){
    while(t++<800){ a=rnd(12,(L===1?29:(L===2?49:69))); b=rnd(13,(L===1?29:49)); if(a+b>100)continue; if((a%10)+(b%10)<10)continue; break; }
  }else{
    while(t++<800){ a=rnd(22,(L===1?59:100)); b=rnd(13,a-1); if((a%10)>=(b%10))continue; if(a-b<1)continue; break; }
  }
  var bT=Math.floor(b/10)*10, bO=b%10;
  var s1=(op==='+')?(a+bT):(a-bT);
  var fin=(op==='+')?(a+b):(a-b);
  var sym=(op==='+')?'+':'−';
  var l1=(op==='+')?'Zehner dazu':'Zehner weg';
  var l2=(op==='+')?'über den Zehner ⬆️':'unter den Zehner ⬇️';
  return {schritt:true, op:op, a:a, b:b, bT:bT, bO:bO, s1:s1, fin:fin, sym:sym, l1:l1, l2:l2};
}

/* ===================== Tanzende Tiere ===================== */
var ZOO=['🐰','🐿️','🦊','🐻','🐱','🐶','🐼','🐨','🐹','🐥','🐸','🦔','🐣','🐧'];
function danceAnimals(n){
  var band=document.getElementById('dancers');
  if(!band){ band=document.createElement('div'); band.id='dancers'; band.className='dancers'; document.body.appendChild(band); }
  var chosen=sampleDistinct(ZOO, Math.min(n||4, ZOO.length));
  band.innerHTML='';
  chosen.forEach(function(a,i){
    var s=document.createElement('span');
    var mv='mv'+(1+Math.floor(Math.random()*6));
    s.className='dancer '+mv; s.textContent=a; s.style.animationDelay=(i*0.07)+'s'; band.appendChild(s);
  });
  band.style.opacity='1';
  clearTimeout(band._t);
  band._t=setTimeout(function(){ band.style.opacity='0'; }, 1600);
}

/* ===================== Routing ===================== */
function pickMode(mode){
  state.mode=mode;
  state.name=(document.getElementById('nameInput').value||'').trim();
  ensureAudio();
  if(mode==='tabelle'||mode==='tausch'){ startBoard(mode); }
  else if(mode==='pass'){ showPass(); }
  else if(mode==='teilen'){ startShare(); }
  else if(mode==='punkte'){ startPunkte(); }
  else if(mode==='gross'){ startGross(); }
  else { startGame(); }
}
function gameBack(){ if(state.mode==='pass'){ showPass(); } else { backToMenu(); } }

/* ===================== Spiel-Modus ===================== */
var praise=['Super! 🌟','Bravo! 🎉','Toll gemacht! 👏','Spitze! 💚','Stark! 💪','Richtig! ✨','Klasse! 🧸'];
function startGame(){
  state.idx=0; state.score=0;
  hideEl('screen-menu'); hideEl('screen-end'); hideEl('screen-board'); hideEl('screen-pass'); show('screen-game');
  document.getElementById('soundToggle2').textContent=state.soundOn?'🔊':'🔇';
  renderStars(); nextQuestion();
}
function nextQuestion(){
  if(state.idx>=ROUND){ if(state.mode==='pass'){ finishPassRow(); return; } showEnd(state.score,ROUND); return; }
  document.getElementById('tip').style.display='none';
  document.getElementById('afterRow').style.display='none';
  document.getElementById('keypad').classList.remove('hide');

  if(state.mode==='schritt'){
    state.current=genSchritt(); state.attempts=0; state.answer=''; state.locked=false;
    document.getElementById('progress').textContent='Frage '+(state.idx+1)+' von '+ROUND;
    document.getElementById('equation').classList.add('asblock');
    startSchritt(); return;
  }
  document.getElementById('equation').classList.remove('asblock');

  if(state.mode==='pass'){
    var k=state.idx+1, n=state.passRow, ans=k*n;
    state.current={left:k+' · '+n+' = ',right:'',answer:ans,tip:tipMal(k,n,ans)};
    state.attempts=0; state.answer=''; state.locked=false;
    document.getElementById('progress').textContent=n+'er-Reihe · '+(state.idx+1)+' von '+ROUND;
    setMascot('idle', state.name?('Los, '+state.name+'! 😊'):'Du schaffst das! 😊');
    renderEquation('input'); return;
  }

  var mode=state.mode==='mix'?pick(['plus','minus','mal','fehlt']):state.mode;
  state.current=genQuestion(mode);
  state.attempts=0; state.answer=''; state.locked=false;
  document.getElementById('progress').textContent='Frage '+(state.idx+1)+' von '+ROUND;
  setMascot('idle', state.name?('Du schaffst das, '+state.name+'! 😊'):'Schaffst du das? 😊');
  renderEquation('input');
}
function renderStars(){var s='';for(var i=0;i<ROUND;i++){s+= i<state.score?'⭐':'<span class="star-off">☆</span>';}document.getElementById('stars').innerHTML=s;}
function renderEquation(st){
  var c=state.current,inner,cls;
  var correctVal = c.schritt ? c.expected : c.answer;
  if(st==='good'||st==='bad'){inner=correctVal; cls='slot '+st;}
  else{inner=state.answer!==''?state.answer:'<span class="caret"></span>'; cls=state.answer===''?'slot empty':'slot';}
  document.getElementById('equation').innerHTML='<span>'+c.left+'</span><span class="'+cls+'">'+inner+'</span><span>'+c.right+'</span>';
}
function setMascot(mood,text){document.getElementById('frog').innerHTML=teddy(mood);document.getElementById('bubble').textContent=text;}
function setMascotEl(id,mood){var e=document.getElementById(id); if(e)e.innerHTML=teddy(mood);}

/* Schritt-Render */
function startSchritt(){
  var c=state.current; c.phase=1; c.step1Solved=false; c.step2Solved=false; c.expected=c.s1;
  c.tip='Tipp: Erst die Zehner – '+c.a+' '+c.sym+' '+c.bT+' = '+c.s1+'.';
  state.answer=''; state.attempts=0; state.locked=false;
  setMascot('idle','Rechne in 2 Schritten – erst die Zehner. 😊');
  renderSchritt('input');
}
function gotoSchrittPhase2(){
  var c=state.current; c.phase=2; c.step1Solved=true; c.expected=c.fin;
  c.tip='Tipp: Jetzt '+(c.op==='+'?'über':'unter')+' den Zehner – '+c.s1+' '+c.sym+' '+c.bO+' = '+c.fin+'.';
  state.answer=''; state.attempts=0; state.locked=false;
  setMascot('idle', c.op==='+'?'Jetzt über den Zehner! ⬆️':'Jetzt unter den Zehner! ⬇️');
  renderSchritt('input');
}
function schrittSlot(st,val){
  if(st==='done'||st==='good') return '<span class="slot mini good">'+val+'</span>';
  if(st==='bad') return '<span class="slot mini bad">'+val+'</span>';
  if(st==='input') return '<span class="slot mini'+(state.answer===''?' empty':'')+'">'+(state.answer!==''?state.answer:'<span class="caret"></span>')+'</span>';
  return '<span class="slot mini empty">▢</span>';
}
function renderSchritt(slotState){
  var c=state.current;
  var s1st = c.step1Solved ? 'done' : (c.phase===1 ? slotState : 'wait');
  var s2st = c.step2Solved ? 'done' : (c.phase===2 ? slotState : 'wait');
  var rowcls=function(solved,active){return 'workstep'+(solved?' done':(active?' active':''));};
  var headRes = c.step2Solved ? c.fin : '?';
  var leftVal2 = c.step1Solved ? c.s1 : '…';
  var html='<div class="worktask">'+c.a+' '+c.sym+' '+c.b+' = <span class="q">'+headRes+'</span></div>';
  html+='<div class="'+rowcls(c.step1Solved, c.phase===1&&!c.step1Solved)+'"><div class="shead"><span class="badge">1</span> '+c.l1+'</div><div class="calc">'+c.a+' '+c.sym+' '+c.bT+' = '+schrittSlot(s1st,c.s1)+'</div></div>';
  html+='<div class="'+rowcls(c.step2Solved, c.phase===2&&!c.step2Solved)+'"><div class="shead"><span class="badge">2</span> '+c.l2+'</div><div class="calc">'+leftVal2+' '+c.sym+' '+c.bO+' = '+schrittSlot(s2st,c.fin)+'</div></div>';
  if(c.step2Solved){ html+='<div class="workresult">'+c.a+' '+c.sym+' '+c.b+' = '+c.fin+' 🎉</div>'; }
  document.getElementById('equation').innerHTML=html;
}

/* ===================== Eingabe (geteilt) ===================== */
function press(d){
  if(state.mode==='punkte'){return punktePress(d);}
  if(state.mode==='gross'){return grossPress(d);}
  if(state.mode==='teilen'){return sharePress(d);}
  if(state.mode==='tabelle'||state.mode==='tausch'){return boardPress(d);}
  if(state.locked)return;
  if(state.answer.length>=3)return;
  if(state.answer===''&&d==='0')return;
  state.answer+=d;
  if(state.mode==='schritt')renderSchritt('input'); else renderEquation('input');
}
function backspace(){
  if(state.mode==='punkte'){return punkteBack();}
  if(state.mode==='gross'){return grossBack();}
  if(state.mode==='teilen'){return shareBack();}
  if(state.mode==='tabelle'||state.mode==='tausch'){return boardBack();}
  if(state.locked)return; state.answer=state.answer.slice(0,-1);
  if(state.mode==='schritt')renderSchritt('input'); else renderEquation('input');
}
function check(){
  if(state.mode==='punkte'){return punkteCheck();}
  if(state.mode==='gross'){return grossCheck();}
  if(state.mode==='teilen'){return shareCheck();}
  if(state.mode==='tabelle'||state.mode==='tausch'){return checkBoard();}
  if(state.locked)return;
  if(state.answer===''){wiggle('equation');return;}
  var sch=state.current.schritt;
  var val=parseInt(state.answer,10); state.attempts++;
  var expected = sch ? state.current.expected : state.current.answer;
  if(val===expected){
    if(sch && state.current.phase===1){
      state.locked=true; sndGood(); setMascot('happy','Genau! ✨'); renderSchritt('good');
      setTimeout(gotoSchrittPhase2,850); return;
    }
    state.locked=true; state.score++; renderStars();
    if(sch){ state.current.step2Solved=true; renderSchritt('good'); } else { renderEquation('good'); }
    document.getElementById('frog').classList.add('hop'); setMascot('happy',pick(praise)); sndGood(); confettiBurst(8); danceAnimals(3);
    document.getElementById('keypad').classList.add('hide');
    setTimeout(function(){document.getElementById('frog').classList.remove('hop'); state.idx++; nextQuestion();}, sch?1300:1000);
  }else{
    sndOops();
    if(state.attempts<2){
      setMascot('think','Hoppla! Probier nochmal. 🧸');
      wiggle('equation'); setTimeout(function(){state.answer=''; if(sch)renderSchritt('input'); else renderEquation('input');},450);
    }else{ reveal(); }
  }
}
function reveal(){
  var sch=state.current.schritt;
  if(sch && state.current.phase===1){
    state.locked=true; renderSchritt('bad');
    setMascot('kind','Schritt 1 ist '+state.current.s1+'. Weiter geht\'s!');
    setTimeout(gotoSchrittPhase2,1300); return;
  }
  state.locked=true; state.idx++;
  if(sch){ renderSchritt('bad'); } else { renderEquation('bad'); }
  var loesung = sch ? state.current.fin : state.current.answer;
  setMascot('kind',(state.name?(state.name+', '):'')+'macht nix! Die Lösung ist '+loesung+'.');
  document.getElementById('keypad').classList.add('hide');
  document.getElementById('afterRow').style.display='flex';
}
function showTip(){var t=document.getElementById('tip'); t.textContent=state.current.tip; t.style.display='block';}
function wiggle(id){var e=document.getElementById(id); e.classList.add('shake'); setTimeout(function(){e.classList.remove('shake');},450);}

/* ===================== Einmaleins-Pass ===================== */
function showPass(){
  hideEl('screen-menu'); hideEl('screen-end'); hideEl('screen-game'); hideEl('screen-board'); show('screen-pass');
  document.getElementById('soundToggle4').textContent=state.soundOn?'🔊':'🔇';
  setMascotEl('passTeddy','idle');
  renderPassGrid();
}
function renderPassGrid(){
  var done=0; for(var r=1;r<=10;r++){ if(passStamps[r])done++; }
  document.getElementById('passProgress').textContent=done+' / 10 🏅';
  document.getElementById('passHint').textContent = done>=10
    ? 'Wow – alle Reihen geschafft! Du bist Einmaleins-Profi! 🏆'
    : 'Wähle eine Reihe. Schaffst du alle 10 richtig, bekommst du den Stempel! 🏅';
  var html='';
  for(var n=1;n<=10;n++){
    var got=!!passStamps[n];
    html+='<button class="passrow'+(got?' done':'')+'" onclick="startRow('+n+')">'
        +'<span class="num">'+n+'</span>'
        +'<span class="meta"><span class="t">'+n+'er-Reihe</span><span class="s">1·'+n+' … 10·'+n+'</span></span>'
        +(got?'<span class="stamp">🏅</span>':'')+'</button>';
  }
  document.getElementById('passGrid').innerHTML=html;
}
function startRow(n){
  ensureAudio();
  state.mode='pass'; state.passRow=n;
  state.name=(document.getElementById('nameInput')?document.getElementById('nameInput').value:'')||state.name;
  startGame();
}
function finishPassRow(){
  var n=state.passRow, allRight=(state.score===ROUND);
  if(allRight){ passStamps[n]=true; savePass(); }
  hideEl('screen-game'); show('screen-pass'); renderPassGrid();
  var t=document.getElementById('passTeddy');
  if(allRight){
    t.innerHTML=teddy('happy'); sndWin(); confettiBurst(46); danceAnimals(6);
    document.getElementById('passHint').textContent='🏅 Stempel verdient für die '+n+'er-Reihe! Super gemacht!';
  }else{
    t.innerHTML=teddy('kind');
    document.getElementById('passHint').textContent='Fast! '+state.score+' von 10 richtig. Probier die '+n+'er-Reihe gleich nochmal. 💪';
  }
}

/* ===================== Punkte-Modus: Verdoppeln & Halbieren (ohne Teilen) ===================== */
var vd=null;
var PUNKTE_ROUNDS=8;
var PUNKTE_PATTERN=['halbieren','verdoppeln','halbieren','verdoppeln','halbieren','verdoppeln','halbieren','verdoppeln'];
var DOTOBJ=['🔵','🟣','🟢','🟠','🔴','🟡','🐞','⭐','🍎','🫐'];

function startPunkte(){
  hideEl('screen-menu'); hideEl('screen-end'); hideEl('screen-game'); hideEl('screen-board'); hideEl('screen-pass'); hideEl('screen-share'); hideEl('screen-gross'); show('screen-punkte');
  document.getElementById('soundToggle7').textContent=state.soundOn?'🔊':'🔇';
  state.idx=0; state.score=0;
  newPunkte();
}
function renderPunkteStars(){var s='';for(var i=0;i<PUNKTE_ROUNDS;i++){s+= i<state.score?'⭐':'<span class="star-off">☆</span>';}document.getElementById('punkteStars').innerHTML=s;}
function setPunkteMascot(mood,text){var f=document.getElementById('frog5'); f.innerHTML=teddy(mood); if(f.firstChild)f.firstChild.classList.add('sm'); document.getElementById('bubble5').textContent=text;}
function dotsRow(count,obj,cls){var s='<div class="dotrow'+(cls?' '+cls:'')+'">';for(var i=0;i<count;i++){s+='<span class="dot">'+obj+'</span>';}return s+'</div>';}

function newPunkte(){
  if(state.idx>=PUNKTE_ROUNDS){ showEnd(state.score,PUNKTE_ROUNDS); return; }
  var L=state.level, maxH=(L===1?5:(L===2?8:10));
  var type=PUNKTE_PATTERN[state.idx%PUNKTE_PATTERN.length];
  var obj=pick(DOTOBJ);
  if(type==='verdoppeln'){
    var X=rnd(1,maxH);
    vd={type:'verdoppeln', obj:obj, X:X, result:2*X, phase:'show1', answer:'', attempts:0, qOk:true};
  } else {
    var half=rnd(1,maxH), N=2*half;
    vd={type:'halbieren', obj:obj, half:half, N:N, phase:'whole', answer:'', attempts:0, qOk:true};
  }
  document.getElementById('punkteProgress').textContent='Aufgabe '+(state.idx+1)+' von '+PUNKTE_ROUNDS;
  document.getElementById('punkteConcl').innerHTML='';
  document.getElementById('punkteAnsArea').innerHTML='';
  document.getElementById('keypad5').classList.add('hide');
  document.getElementById('punkteActionWrap').style.display='block';
  renderPunkteStars();
  renderPunkte();
}
function renderPunkte(){
  var btn=document.getElementById('punkteActionBtn');
  if(vd.type==='verdoppeln'){
    if(vd.phase==='show1'){
      document.getElementById('punktePrompt').innerHTML='Verdopple: nimm die '+vd.X+' '+vd.obj+' <b>nochmal</b>!';
      document.getElementById('punkteArea').innerHTML='<div class="dotbox two"><div><div class="rowtag">so viele:</div>'+dotsRow(vd.X,vd.obj)+'</div></div>';
      setPunkteMascot('idle','Verdoppeln heißt: nochmal genau so viele! 😊');
      btn.textContent='➕ Nochmal so viele dazu';
    } else {
      document.getElementById('punktePrompt').innerHTML=vd.X+' und nochmal '+vd.X+' – wie viele '+vd.obj+' sind das <b>zusammen</b>?';
      document.getElementById('punkteArea').innerHTML='<div class="dotbox two"><div><div class="rowtag">'+vd.X+':</div>'+dotsRow(vd.X,vd.obj)+'</div><div class="pluscenter">und nochmal</div><div><div class="rowtag">'+vd.X+':</div>'+dotsRow(vd.X,vd.obj)+'</div></div>';
      setPunkteMascot('happy','Jetzt alle zusammenzählen! ✨');
    }
  } else {
    if(vd.phase==='whole'){
      document.getElementById('punktePrompt').innerHTML='Hier sind '+vd.N+' '+vd.obj+'. Teile sie in <b>zwei gleiche Reihen</b>.';
      document.getElementById('punkteArea').innerHTML='<div class="dotbox">'+dotsRow(vd.N,vd.obj)+'</div>';
      setPunkteMascot('idle','Halbieren heißt: zwei gleich große Reihen machen. 😊');
      btn.textContent='✌️ In zwei gleiche Reihen legen';
    } else {
      document.getElementById('punktePrompt').innerHTML='Zwei gleiche Reihen! Wie viele '+vd.obj+' sind in <b>einer</b> Reihe?';
      document.getElementById('punkteArea').innerHTML='<div class="dotbox two"><div><div class="rowtag">Reihe 1:</div>'+dotsRow(vd.half,vd.obj)+'</div><div><div class="rowtag">Reihe 2:</div>'+dotsRow(vd.half,vd.obj)+'</div></div>';
      setPunkteMascot('happy','Beide Reihen sind gleich! Zähl eine Reihe. ✨');
    }
  }
}
function punkteAction(){
  if(vd.type==='verdoppeln' && vd.phase==='show1'){ vd.phase='show2'; sndGood(); renderPunkte(); punkteToAnswer(); }
  else if(vd.type==='halbieren' && vd.phase==='whole'){ vd.phase='split'; sndGood(); renderPunkte(); punkteToAnswer(); }
}
function punkteToAnswer(){
  document.getElementById('punkteActionWrap').style.display='none';
  document.getElementById('keypad5').classList.remove('hide');
  renderPunkteAnswer();
}
function punkteSlot(){ return '<span class="slot'+(vd.answer===''?' empty':'')+'" style="min-width:84px;height:66px;">'+(vd.answer!==''?vd.answer:'<span class="caret"></span>')+'</span>'; }
function renderPunkteAnswer(){
  var html;
  if(vd.type==='verdoppeln'){ html='<div class="dotAns">'+vd.X+' + '+vd.X+' = '+punkteSlot()+'</div>'; }
  else { html='<div class="dotAns">In einer Reihe: '+punkteSlot()+'</div>'; }
  document.getElementById('punkteAnsArea').innerHTML=html;
}
function punktePress(d){
  if(vd.phase==='show1'||vd.phase==='whole')return;
  if(vd.answer.length>=2)return;
  if(vd.answer===''&&d==='0')return;
  vd.answer+=d; renderPunkteAnswer();
}
function punkteBack(){ if(vd.phase==='show1'||vd.phase==='whole')return; vd.answer=vd.answer.slice(0,-1); renderPunkteAnswer(); }
function punkteCheck(){
  if(vd.phase==='show1'||vd.phase==='whole')return;
  if(vd.answer===''){ wiggle('punkteAnsArea'); return; }
  var val=parseInt(vd.answer,10); vd.attempts++;
  var expected = (vd.type==='verdoppeln') ? vd.result : vd.half;
  if(val===expected){ sndGood(); punkteFinish(); }
  else {
    sndOops();
    if(vd.attempts<2){ setPunkteMascot('think','Fast! Zähl noch einmal ganz genau. 🧸'); wiggle('punkteAnsArea'); vd.answer=''; setTimeout(renderPunkteAnswer,300); }
    else { vd.qOk=false; punkteFinish(); }
  }
}
function punkteFinish(){
  vd.phase='done';
  document.getElementById('keypad5').classList.add('hide');
  document.getElementById('punkteAnsArea').innerHTML='';
  if(vd.qOk){ state.score++; renderPunkteStars(); }
  var concl;
  if(vd.type==='verdoppeln'){
    concl='<div class="shareConcl"><div class="big">'+vd.X+' + '+vd.X+' = '+vd.result+'</div><div class="reg">Das <b>Doppelte</b> von '+vd.X+' ist <b>'+vd.result+'</b>.</div></div>';
    setPunkteMascot('happy','Super verdoppelt! 🎉');
  } else {
    concl='<div class="shareConcl"><div class="big">'+vd.half+' + '+vd.half+' = '+vd.N+'</div><div class="reg">Die <b>Hälfte</b> von '+vd.N+' ist <b>'+vd.half+'</b>. (Halbieren ist Verdoppeln rückwärts!)</div></div>';
    setPunkteMascot('happy','Super halbiert! 🎉');
  }
  sndWin(); danceAnimals(5); confettiBurst(14);
  var box=document.getElementById('punkteConcl'); box.innerHTML=concl;
  var b=document.createElement('div'); b.style.marginTop='10px';
  b.innerHTML='<button class="btn btn-green" onclick="afterPunkte()">Weiter ➜</button>';
  box.appendChild(b);
}
function afterPunkte(){ state.idx++; newPunkte(); }

/* ===================== Im 100er-Raum: Gerade/Ungerade, Halbieren, Verdoppeln ===================== */
var gt=null;
var GROSS_ROUNDS=8;
var GROSS_PATTERN=['erkennen','halb','erkennen','nachbar','doppel','erkennen','halb','nachbar'];

function startGross(){
  hideEl('screen-menu'); hideEl('screen-end'); hideEl('screen-game'); hideEl('screen-board'); hideEl('screen-pass'); hideEl('screen-share'); show('screen-gross');
  document.getElementById('soundToggle6').textContent=state.soundOn?'🔊':'🔇';
  state.idx=0; state.score=0;
  newGross();
}
function renderGrossStars(){var s='';for(var i=0;i<GROSS_ROUNDS;i++){s+= i<state.score?'⭐':'<span class="star-off">☆</span>';}document.getElementById('grossStars').innerHTML=s;}
function setGrossMascot(mood,text){var f=document.getElementById('frog4'); f.innerHTML=teddy(mood); if(f.firstChild)f.firstChild.classList.add('sm'); document.getElementById('bubble4').textContent=text;}

function evenDigits(){ return {t:pick([2,4,6,8]), o:pick([2,4,6,8])}; }
function makeErkennen(){
  var L=state.level, lo=(L===1?10:20), hi=(L===1?49:99);
  var N=rnd(lo,hi);
  return {type:'erkennen', N:N, answer:(N%2===0?'gerade':'ungerade'),
    prompt:'Ist diese Zahl gerade oder ungerade?',
    tip:'Tipp: Schau nur auf die letzte Ziffer (die Einer). 0, 2, 4, 6, 8 → gerade. 1, 3, 5, 7, 9 → ungerade.'};
}
function makeHalb(){
  var d=evenDigits(), N=d.t*10+d.o, h=(d.t/2)*10+(d.o/2);
  return {type:'halb', N:N, result:h,
    prompt:'Halbiere die Zahl <span class="bignum">'+N+'</span>',
    helper:'Halbieren ist Verdoppeln rückwärts: such die Zahl, die verdoppelt so groß ist.',
    steps:[
      {label:'Hälfte der Zehner', calc:'Hälfte von '+(d.t*10)+' = ', expected:(d.t/2)*10},
      {label:'Hälfte der Einer', calc:'Hälfte von '+d.o+' = ', expected:(d.o/2)},
      {label:'Beide Hälften zusammen', calc:((d.t/2)*10)+' + '+(d.o/2)+' = ', expected:h}
    ],
    conclusion:'<div class="big">'+N+' = '+h+' + '+h+'</div><div class="reg">Zweimal dasselbe! '+N+' ist <b>gerade</b> – die Hälfte ist <b>'+h+'</b>.</div>'};
}
function makeNachbar(){
  var d=evenDigits(), E=d.t*10+d.o, N=E+1, a=(d.t/2)*10+(d.o/2);
  return {type:'nachbar', N:N, result:a,
    prompt:'Teile <span class="bignum">'+N+'</span> in zwei Nachbarzahlen',
    helper:'Erst die gerade Nachbarzahl in zwei gleiche Teile, dann bekommt einer eins mehr.',
    steps:[
      {label:'Hälfte der geraden Nachbarzahl '+E, calc:'Hälfte von '+E+' = ', expected:a},
      {label:'Die nächste Zahl ist eins mehr', calc:a+' + 1 = ', expected:a+1}
    ],
    conclusion:'<div class="big">'+N+' = '+a+' + '+(a+1)+'</div><div class="reg">Eine Zahl und ihre <b>Nachbarzahl</b>! '+N+' ist <b>ungerade</b> ('+a+' und '+(a+1)+').</div>'};
}
function makeDoppel(){
  var t=pick([1,2,3,4]), o=pick([1,2,3,4]), N=t*10+o, dd=2*N;
  return {type:'doppel', N:N, result:dd,
    prompt:'Verdopple die Zahl <span class="bignum">'+N+'</span>',
    steps:[
      {label:'Verdopple die Zehner', calc:(t*10)+' + '+(t*10)+' = ', expected:t*20},
      {label:'Verdopple die Einer', calc:o+' + '+o+' = ', expected:o*2},
      {label:'Zähle zusammen', calc:(t*20)+' + '+(o*2)+' = ', expected:dd}
    ],
    conclusion:'<div class="big">'+N+' + '+N+' = '+dd+'</div><div class="reg">Das <b>Doppelte</b> von '+N+' ist <b>'+dd+'</b>.</div>'};
}
function newGross(){
  if(state.idx>=GROSS_ROUNDS){ showEnd(state.score,GROSS_ROUNDS); return; }
  var type=GROSS_PATTERN[state.idx%GROSS_PATTERN.length];
  if(type==='erkennen')gt=makeErkennen();
  else if(type==='halb')gt=makeHalb();
  else if(type==='nachbar')gt=makeNachbar();
  else gt=makeDoppel();
  gt.stepIdx=0; gt.answer=''; gt.attempts=0; gt.qOk=true; gt.done=false;
  document.getElementById('grossProgress').textContent='Aufgabe '+(state.idx+1)+' von '+GROSS_ROUNDS;
  document.getElementById('tip4').style.display='none';
  document.getElementById('grossConcl').innerHTML='';
  renderGrossStars();
  if(gt.type==='erkennen'){
    document.getElementById('keypad4').classList.add('hide');
    document.getElementById('grossChoice').classList.remove('hide');
    document.getElementById('grossPrompt').innerHTML=gt.prompt+'<div class="bignum" style="margin-top:6px;">'+gt.N+'</div>';
    document.getElementById('grossArea').innerHTML='';
    setGrossMascot('idle','Schau auf die letzte Ziffer! 👀');
  } else {
    document.getElementById('grossChoice').classList.add('hide');
    document.getElementById('keypad4').classList.remove('hide');
    document.getElementById('grossPrompt').innerHTML=gt.prompt + (gt.helper?'<div style="font-size:clamp(14px,2.2vw,17px);color:var(--muted);font-weight:700;margin-top:4px;">💡 '+gt.helper+'</div>':'');
    setGrossMascot('idle','Rechne Schritt für Schritt. 😊');
    renderGrossSteps('input');
  }
}
function grossSlot(st,val){
  if(st==='done'||st==='good') return '<span class="slot mini good">'+val+'</span>';
  if(st==='input') return '<span class="slot mini'+(gt.answer===''?' empty':'')+'">'+(gt.answer!==''?gt.answer:'<span class="caret"></span>')+'</span>';
  return '<span class="slot mini empty">▢</span>';
}
function renderGrossSteps(slotState){
  var html='';
  gt.steps.forEach(function(s,i){
    var solved=i<gt.stepIdx, active=(i===gt.stepIdx);
    var cls='workstep'+(solved?' done':(active?' active':''));
    var st=solved?'done':(active?slotState:'wait');
    html+='<div class="'+cls+'"><div class="shead"><span class="badge">'+(i+1)+'</span> '+s.label+'</div>'
        +'<div class="calc">'+s.calc+grossSlot(st,s.expected)+'</div></div>';
  });
  document.getElementById('grossArea').innerHTML=html;
}
function gChoose(val){
  if(gt.type!=='erkennen'||gt.done)return;
  gt.attempts++;
  var lastDigit=gt.N%10;
  if(val===gt.answer){
    gt.done=true; if(gt.qOk){state.score++; renderGrossStars();}
    sndGood(); danceAnimals(4); confettiBurst(10);
    setGrossMascot('happy','Richtig! Die Einer-Ziffer '+lastDigit+' zeigt: '+gt.answer+'. 🎉');
    document.getElementById('grossChoice').classList.add('hide');
    showGrossConcl('<div class="shareConcl"><div class="big">'+gt.N+' ist '+gt.answer+'</div><div class="reg">Die letzte Ziffer ist <span class="digHi">'+lastDigit+'</span> → '+gt.answer+'.</div></div>');
  } else {
    sndOops(); gt.qOk=false;
    if(gt.attempts<2){ setGrossMascot('think','Schau nochmal: die letzte Ziffer ist '+lastDigit+'. 🧸'); }
    else {
      gt.done=true; setGrossMascot('kind','Die letzte Ziffer '+lastDigit+' → '+gt.answer+'.');
      document.getElementById('grossChoice').classList.add('hide');
      showGrossConcl('<div class="shareConcl"><div class="big">'+gt.N+' ist '+gt.answer+'</div><div class="reg">Die letzte Ziffer ist <span class="digHi">'+lastDigit+'</span> → '+gt.answer+'.</div></div>');
    }
  }
}
function grossPress(d){
  if(gt.type==='erkennen'||gt.done)return;
  if(gt.answer.length>=3)return;
  if(gt.answer===''&&d==='0')return;
  gt.answer+=d; renderGrossSteps('input');
}
function grossBack(){ if(gt.type==='erkennen'||gt.done)return; gt.answer=gt.answer.slice(0,-1); renderGrossSteps('input'); }
function grossCheck(){
  if(gt.type==='erkennen'||gt.done)return;
  if(gt.answer===''){ wiggle('grossArea'); return; }
  var step=gt.steps[gt.stepIdx];
  var val=parseInt(gt.answer,10); gt.attempts++;
  if(val===step.expected){
    sndGood();
    gt.stepIdx++; gt.answer=''; gt.attempts=0;
    if(gt.stepIdx>=gt.steps.length){ grossFinish(); }
    else { setGrossMascot('idle','Stark! Weiter. ✨'); renderGrossSteps('input'); }
  } else {
    sndOops();
    if(gt.attempts<2){ setGrossMascot('think','Fast! Probier nochmal. 🧸'); wiggle('grossArea'); gt.answer=''; setTimeout(function(){renderGrossSteps('input');},300); }
    else {
      gt.qOk=false;
      setGrossMascot('kind','Hier ist es '+step.expected+'. Weiter geht\'s!');
      gt.stepIdx++; gt.answer=''; gt.attempts=0;
      if(gt.stepIdx>=gt.steps.length){ grossFinish(); }
      else { renderGrossSteps('input'); }
    }
  }
}
function grossFinish(){
  gt.done=true;
  renderGrossSteps('done');
  document.getElementById('keypad4').classList.add('hide');
  if(gt.qOk){ state.score++; renderGrossStars(); }
  sndWin(); danceAnimals(5); confettiBurst(14);
  setGrossMascot('happy','Super gemacht! 🎉');
  showGrossConcl('<div class="shareConcl">'+gt.conclusion+'</div>');
}
function showGrossConcl(html){
  var box=document.getElementById('grossConcl');
  box.innerHTML=html;
  var btn=document.createElement('div'); btn.style.marginTop='10px';
  btn.innerHTML='<button class="btn btn-green" onclick="afterGross()">Weiter ➜</button>';
  box.appendChild(btn);
}
function afterGross(){ state.idx++; newGross(); }
function showGrossTip(){ if(gt.type==='erkennen'){var t=document.getElementById('tip4'); t.textContent=gt.tip; t.style.display='block';} }

/* ===================== Teilen-Modus (Halbieren & Nachbarn) ===================== */
var shr=null;
var SHARE_ROUNDS=6;
var OBJECTS=['🍓','🌰','🍯','🍎','🫐','🥕','🍪','🌼'];

function startShare(){
  hideEl('screen-menu'); hideEl('screen-end'); hideEl('screen-game'); hideEl('screen-board'); hideEl('screen-pass'); show('screen-share');
  document.getElementById('soundToggle5').textContent=state.soundOn?'🔊':'🔇';
  state.idx=0; state.score=0;
  newShare();
}
function renderShareStars(){var s='';for(var i=0;i<SHARE_ROUNDS;i++){s+= i<state.score?'⭐':'<span class="star-off">☆</span>';}document.getElementById('shareStars').innerHTML=s;}
function setShareMascot(mood,text){var f=document.getElementById('frog3'); f.innerHTML=teddy(mood); if(f.firstChild)f.firstChild.classList.add('sm'); document.getElementById('bubble3').textContent=text;}

function newShare(){
  if(state.idx>=SHARE_ROUNDS){ showEnd(state.score,SHARE_ROUNDS); return; }
  var L=state.level;
  var lo=(L===1?4:(L===2?6:10)), hi=(L===1?10:(L===2?16:20));
  var N=rnd(lo,hi);
  // pro Runde gerade/ungerade abwechseln, damit beide Fälle vorkommen
  var wantEven=(state.idx%2===0);
  if((N%2===0)!==wantEven){ N=(N+1<=hi)?N+1:N-1; }
  var even=(N%2===0);
  var pairs=Math.floor(N/2);
  var anims=sampleDistinct(['🐰','🐿️','🦊','🐱','🐶','🐻','🐼','🐨','🐹'],2);
  shr={
    N:N, even:even, pairs:pairs,
    obj:pick(OBJECTS),
    aL:anims[0], aR:anims[1],
    basket:N, left:0, right:0, leftover:0,
    phase:'deal', askStep:1, answer:'', attempts:0, qOk:true,
    small:pairs, big:pairs+ (even?0:1), half:pairs
  };
  document.getElementById('shareProgress').textContent='Aufgabe '+(state.idx+1)+' von '+SHARE_ROUNDS;
  document.getElementById('keypad3').classList.add('hide');
  document.getElementById('tip3').style.display='none';
  document.getElementById('shareConcl').innerHTML='';
  document.getElementById('shareAnsArea').innerHTML='';
  document.getElementById('shareDealWrap').style.display='block';
  document.getElementById('shareDealBtn').textContent='🤲 Eine an jeden geben';
  renderShareStars();
  setShareMascot('idle','Teile die '+N+' '+shr.obj+' gerecht an beide Tiere auf!');
  document.getElementById('shareInstr').innerHTML='Wie viele '+shr.obj+' sind es? <span class="bignum">'+N+'</span>';
  renderShareScene();
}
function chipsHTML(count,obj){var s='';for(var i=0;i<count;i++){s+='<span class="chip">'+obj+'</span>';}return s;}
function renderShareScene(){
  document.getElementById('shareBasket').innerHTML='<div class="chips">'+(shr.basket>0?chipsHTML(shr.basket,shr.obj):'<span style="color:var(--muted);font-weight:800;">leer ✓</span>')+'</div>';
  var moreL=(!shr.even && shr.left>shr.right), moreR=(!shr.even && shr.right>shr.left);
  document.getElementById('sharePlates').innerHTML=
    '<div class="plate'+(moreL?' more':'')+'"><div class="animal">'+shr.aL+'</div><div class="pchips">'+chipsHTML(shr.left,shr.obj)+'</div><div class="pcount">'+shr.left+'</div>'+(moreL?'<div class="ptag">eins mehr</div>':'')+'</div>'+
    '<div class="plate'+(moreR?' more':'')+'"><div class="animal">'+shr.aR+'</div><div class="pchips">'+chipsHTML(shr.right,shr.obj)+'</div><div class="pcount">'+shr.right+'</div>'+(moreR?'<div class="ptag">eins mehr</div>':'')+'</div>';
}
function shareDeal(){
  if(shr.phase!=='deal')return;
  if(shr.basket>=2){
    shr.left++; shr.right++; shr.basket-=2; sndGood(); renderShareScene();
    if(shr.basket>=2){ setShareMascot('idle','Genau – jedem eins. Weiter so! 😊'); document.getElementById('shareDealBtn').textContent='🤲 Eine an jeden geben'; }
    else if(shr.basket===1){ setShareMascot('think','Schau – EINER bleibt übrig! Den bekommt nur ein Tier.'); document.getElementById('shareDealBtn').textContent='👉 Den letzten dem '+shr.aL+' geben'; }
    else { dealtDone(); }
  } else if(shr.basket===1){
    shr.left++; shr.basket-=1; sndGood(); renderShareScene(); dealtDone();
  }
}
function shareDealAll(){
  if(shr.phase!=='deal')return;
  while(shr.basket>=2){ shr.left++; shr.right++; shr.basket-=2; }
  if(shr.basket===1){ shr.left++; shr.basket-=1; }
  sndGood(); renderShareScene(); dealtDone();
}
function dealtDone(){
  shr.phase='ask'; shr.askStep=1; shr.answer=''; shr.attempts=0;
  document.getElementById('shareDealWrap').style.display='none';
  document.getElementById('keypad3').classList.remove('hide');
  if(shr.even){
    setShareMascot('happy','Beide haben GLEICH viel! Wie viele hat jedes Tier?');
    shr.tip='Tipp: Zähle die '+shr.obj+' bei einem Tier. Beide sind gleich – das ist die Hälfte von '+shr.N+'.';
  } else {
    setShareMascot('happy','Einer hat eins mehr! Wie viele hat das '+shr.aL+'? (das mit eins mehr)');
    shr.tip='Tipp: Das '+shr.aL+' hat eins mehr. Zähle seine '+shr.obj+'.';
  }
  renderShareAnswer();
}
function shareSlot(){
  return '<span class="slot'+(shr.answer===''?' empty':'')+'" style="min-width:80px;height:64px;">'+(shr.answer!==''?shr.answer:'<span class="caret"></span>')+'</span>';
}
function renderShareAnswer(){
  var html='';
  if(shr.even){
    html='<div class="shareAns">Jedes Tier hat '+shareSlot()+'</div>';
  } else {
    if(shr.askStep===1){ html='<div class="shareAns">'+shr.aL+' hat '+shareSlot()+'</div>'; }
    else { html='<div class="shareAns">'+shr.aL+' hat <span class="slot good" style="min-width:70px;height:60px;">'+shr.big+'</span> &nbsp; '+shr.aR+' hat '+shareSlot()+'</div>'; }
  }
  document.getElementById('shareAnsArea').innerHTML=html;
}
function sharePress(d){
  if(shr.phase!=='ask')return;
  if(shr.answer.length>=2)return;
  if(shr.answer===''&&d==='0')return;
  shr.answer+=d; renderShareAnswer();
}
function shareBack(){ if(shr.phase!=='ask')return; shr.answer=shr.answer.slice(0,-1); renderShareAnswer(); }
function shareCheck(){
  if(shr.phase!=='ask')return;
  if(shr.answer===''){ wiggle('shareAnsArea'); return; }
  var val=parseInt(shr.answer,10); shr.attempts++;
  var expected = shr.even ? shr.half : (shr.askStep===1 ? shr.big : shr.small);
  if(val===expected){
    sndGood();
    if(shr.even){ shareFinish(); return; }
    if(shr.askStep===1){ shr.askStep=2; shr.answer=''; shr.attempts=0; setShareMascot('idle','Stark! Und wie viele hat das '+shr.aR+'? (eins weniger)'); shr.tip='Tipp: Das '+shr.aR+' hat eins weniger als das '+shr.aL+'.'; renderShareAnswer(); return; }
    shareFinish(); return;
  } else {
    sndOops();
    if(shr.attempts<2){ setShareMascot('think','Fast! Zähl noch einmal genau. 🧸'); wiggle('shareAnsArea'); shr.answer=''; setTimeout(renderShareAnswer,300); }
    else { shr.qOk=false;
      if(shr.even){ shareFinish(); }
      else if(shr.askStep===1){ shr.askStep=2; shr.answer=''; shr.attempts=0; setShareMascot('kind','Das '+shr.aL+' hat '+shr.big+'. Und das '+shr.aR+'?'); renderShareAnswer(); }
      else { shareFinish(); }
    }
  }
}
function shareFinish(){
  shr.phase='done';
  document.getElementById('keypad3').classList.add('hide');
  document.getElementById('shareAnsArea').innerHTML='';
  if(shr.qOk){ state.score++; renderShareStars(); }
  var concl;
  if(shr.even){
    concl='<div class="shareConcl"><div class="big">'+shr.N+' = '+shr.half+' + '+shr.half+'</div>'
        +'<div class="reg">Zweimal dasselbe! 👯 '+shr.N+' ist eine <b>gerade</b> Zahl – man kann sie <b>halbieren</b>.</div></div>';
    setShareMascot('happy','Super! '+shr.N+' ist gerade. 🎉');
  } else {
    concl='<div class="shareConcl"><div class="big">'+shr.N+' = '+shr.big+' + '+shr.small+'</div>'
        +'<div class="reg">Eine Zahl und ihre <b>Nachbarzahl</b>! ('+shr.small+' und '+shr.big+') '+shr.N+' ist eine <b>ungerade</b> Zahl – einer bekommt eins mehr.</div></div>';
    setShareMascot('happy','Super! '+shr.N+' ist ungerade. 🎉');
  }
  document.getElementById('shareConcl').innerHTML=concl;
  sndWin(); danceAnimals(5); confettiBurst(14);
  var btn=document.createElement('div'); btn.style.marginTop='10px';
  btn.innerHTML='<button class="btn btn-green" onclick="afterShare()">Weiter ➜</button>';
  document.getElementById('shareConcl').appendChild(btn);
}
function afterShare(){ state.idx++; newShare(); }

/* ===================== Brett-Modus ===================== */
function startBoard(mode){
  hideEl('screen-menu'); hideEl('screen-end'); hideEl('screen-game'); hideEl('screen-pass'); show('screen-board');
  document.getElementById('soundToggle3').textContent=state.soundOn?'🔊':'🔇';
  document.getElementById('tip2').style.display='none';
  board={mode:mode,items:[],activeId:null,answer:'',firstTry:0,grandTotal:0,familyIndex:0};
  if(mode==='tabelle'){ buildTable(); } else { board.grandTotal=12; loadFamily(0); }
  setBoardMascot('idle','Tippe ein Feld an! ☝️');
}
function setBoardMascot(mood,text){var f=document.getElementById('frog2'); f.innerHTML=teddy(mood); if(f.firstChild)f.firstChild.classList.add('sm'); document.getElementById('bubble2').textContent=text;}
function newItem(left,right,ans){return {id:'i'+board.items.length,left:left,right:right,ans:ans,solved:false,attempts:0};}
function cellHTML(it){
  var cls='cell'+(it.solved?' solved':'')+(board.activeId===it.id?' active':'');
  var inner = it.solved?it.ans:(board.activeId===it.id?(board.answer!==''?board.answer:'<span class="caret"></span>'):'▢');
  return '<span class="'+cls+'" onclick="selectFill(\''+it.id+'\')">'+inner+'</span>';
}
function buildTable(){
  var L=state.level, op=pick(['+','-']);
  var n=(L===1?2:3), m=(L===1?2:3);
  var rows,cols;
  if(op==='+'){
    var range=(L===3?[14,46]:(L===2?[12,38]:[6,19]));
    rows=sampleDistinct(rangeList(range[0],range[1]),n);
    cols=sampleDistinct(rangeList(range[0],range[1]),m);
    var maxR=Math.max.apply(null,rows),maxC=Math.max.apply(null,cols);
    while(maxR+maxC>100){ cols=cols.map(function(v){return Math.max(6,v-5);}); maxC=Math.max.apply(null,cols); }
  }else{
    var cr=(L===3?[14,34]:(L===2?[12,28]:[2,9]));
    cols=sampleDistinct(rangeList(cr[0],cr[1]),m);
    var maxC2=Math.max.apply(null,cols);
    rows=sampleDistinct(rangeList(maxC2+(L===1?6:8),(L===1?40:99)),n);
  }
  board.items=[];
  var html='<table class="rtable"><tr><th class="corner">'+(op==='+'?'+':'−')+'</th>';
  cols.forEach(function(c){html+='<th>'+c+'</th>';}); html+='</tr>';
  rows.forEach(function(r){
    html+='<tr><th>'+r+'</th>';
    cols.forEach(function(c){ var ans=(op==='+')?(r+c):(r-c); var it=newItem('','',ans); board.items.push(it); html+='<td>'+cellHTML(it)+'</td>'; });
    html+='</tr>';
  });
  html+='</table>';
  board.grandTotal=board.items.length;
  document.getElementById('boardArea').innerHTML=html; updateBoardProgress();
}
function loadFamily(i){
  board.familyIndex=i;
  var L=state.level,t=0,p1,p2,whole;
  while(t++<600){
    p1=rnd(11,(L>=2?59:39)); p2=rnd(11,(L>=2?49:39)); whole=p1+p2;
    if(whole>100)continue; var cross=(p1%10+p2%10)>=10;
    if(L===1&&cross)continue; if(L===3&&!cross)continue; break;
  }
  board.items=[newItem(p1+' + '+p2+' = ','',whole),newItem(p2+' + '+p1+' = ','',whole),newItem(whole+' − '+p1+' = ','',p2),newItem(whole+' − '+p2+' = ','',p1)];
  board.activeId=null; board.answer='';
  var html='<div class="house"><div class="roof">das Ganze</div><div class="top">'+whole+'</div><div class="bottom"><div class="part">'+p1+'</div><div class="part">'+p2+'</div></div></div>';
  board.items.forEach(function(it){ html+='<div class="feq"><span>'+it.left+'</span>'+cellHTML(it)+'</div>'; });
  document.getElementById('boardArea').innerHTML=html; updateBoardProgress();
}
function updateBoardProgress(){
  var solved=board.items.filter(function(x){return x.solved;}).length;
  if(board.mode==='tabelle'){ document.getElementById('boardProgress').textContent='Tabelle · '+solved+' / '+board.items.length+' ✓'; }
  else{ document.getElementById('boardProgress').textContent='Familie '+(board.familyIndex+1)+' von 3'; }
}
function rerenderBoard(){
  document.querySelectorAll('#boardArea .cell').forEach(function(sp){
    var id=sp.getAttribute('onclick').match(/'(i\d+)'/)[1];
    var it=board.items.filter(function(x){return x.id===id;})[0];
    sp.className='cell'+(it.solved?' solved':'')+(board.activeId===it.id?' active':'');
    sp.innerHTML = it.solved?it.ans:(board.activeId===it.id?(board.answer!==''?board.answer:'<span class="caret"></span>'):'▢');
  });
}
function selectFill(id){ var it=board.items.filter(function(x){return x.id===id;})[0]; if(!it||it.solved)return; board.activeId=id; board.answer=''; rerenderBoard(); }
function boardPress(d){ if(board.activeId===null){setBoardMascot('think','Tippe zuerst ein Feld an. ☝️');return;} if(board.answer.length>=3)return; if(board.answer===''&&d==='0')return; board.answer+=d; rerenderBoard(); }
function boardBack(){ if(board.activeId===null)return; board.answer=board.answer.slice(0,-1); rerenderBoard(); }
function checkBoard(){
  if(board.activeId===null){setBoardMascot('think','Tippe zuerst ein Feld an. ☝️');return;}
  if(board.answer===''){wiggle('boardArea');return;}
  var it=board.items.filter(function(x){return x.id===board.activeId;})[0];
  var val=parseInt(board.answer,10); it.attempts++;
  if(val===it.ans){
    it.solved=true; if(it.attempts===1)board.firstTry++;
    board.activeId=null; board.answer=''; rerenderBoard(); updateBoardProgress();
    sndGood(); setBoardMascot('happy',pick(praise)); confettiBurst(6); danceAnimals(3); afterBoardSolve();
  }else{
    sndOops();
    if(it.attempts>=3){ it.solved=true; board.activeId=null; board.answer=''; rerenderBoard(); updateBoardProgress(); setBoardMascot('kind','Die Lösung war '+it.ans+'. Weiter geht\'s!'); afterBoardSolve(); }
    else{ setBoardMascot('think','Fast! Probier nochmal. 🧸'); wiggle('boardArea'); }
  }
}
function afterBoardSolve(){
  if(!board.items.every(function(x){return x.solved;}))return;
  if(board.mode==='tabelle'){ setTimeout(function(){showEnd(board.firstTry,board.grandTotal);},700); }
  else{ if(board.familyIndex<2){ setTimeout(function(){loadFamily(board.familyIndex+1); setBoardMascot('idle','Nächstes Zahlenhaus! 🏠');},800); } else { setTimeout(function(){showEnd(board.firstTry,board.grandTotal);},700); } }
}

/* ===================== Ende ===================== */
function showEnd(score,total){
  hideEl('screen-game'); hideEl('screen-board'); hideEl('screen-pass'); show('screen-end');
  document.getElementById('endScore').textContent='⭐ '+score+' von '+total;
  var pct=total>0?score/total:0, title,msg, mood='happy', who=state.name?state.name+', ':'';
  if(pct>=1){title='PERFEKT!'; msg=who+'du bist ein echter Rechen-Profi!'; mood='happy';}
  else if(pct>=0.8){title='Super gemacht!'; msg=who+'das war richtig stark!'; mood='happy';}
  else if(pct>=0.5){title='Gut gemacht!'; msg=who+'weiter so – du wirst immer besser!'; mood='kind';}
  else{title='Schön geübt!'; msg='Jede Übung macht dich stärker. Probier es gleich nochmal!'; mood='kind';}
  document.getElementById('endTeddy').innerHTML=teddy(mood);
  document.getElementById('endTitle').textContent=title;
  document.getElementById('endMsg').textContent=msg;
  sndWin(); if(pct>=0.5){confettiBurst(40); danceAnimals(6);}
}
function replay(){ pickMode(state.mode); }
function backToMenu(){ hideEl('screen-game'); hideEl('screen-board'); hideEl('screen-pass'); hideEl('screen-share'); hideEl('screen-gross'); hideEl('screen-punkte'); hideEl('screen-end'); show('screen-menu'); }

/* ===================== Konfetti ===================== */
function confettiBurst(n){
  var icons=['⭐','🎉','🍯','🧸','✨','💛','🏅'];
  for(var i=0;i<n;i++){(function(){
    var el=document.createElement('div'); el.className='confetti';
    el.textContent=icons[Math.floor(Math.random()*icons.length)];
    el.style.left=(Math.random()*100)+'vw';
    var dur=2+Math.random()*1.8; el.style.animationDuration=dur+'s';
    el.style.fontSize=(20+Math.random()*20)+'px';
    document.body.appendChild(el); setTimeout(function(){el.remove();},dur*1000+200);
  })();}
}

/* ===================== Tastatur (Computer) ===================== */
document.addEventListener('keydown',function(e){
  var gameOn=!document.getElementById('screen-game').classList.contains('hide');
  var boardOn=!document.getElementById('screen-board').classList.contains('hide');
  var shareOn=!document.getElementById('screen-share').classList.contains('hide');
  var grossOn=!document.getElementById('screen-gross').classList.contains('hide');
  var punkteOn=!document.getElementById('screen-punkte').classList.contains('hide');
  if(!gameOn&&!boardOn&&!shareOn&&!grossOn&&!punkteOn)return;
  if(e.key>='0'&&e.key<='9')press(e.key);
  else if(e.key==='Backspace'){e.preventDefault();backspace();}
  else if(e.key==='Enter')check();
});

/* ===================== Init ===================== */
document.getElementById('menuTeddy').innerHTML=teddy('idle');
</script>

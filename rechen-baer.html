<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Rechen-B√§r рЯІЄ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky1:#ffe9c7; --sky2:#fff6e9;
    --grass:#86d168; --grass-dk:#54ab40;
    --sun:#ffd64d;
    --coral:#ff7a6b; --coral-dk:#e85c4c;
    --blue:#37a3ff; --blue-dk:#1f7fd6;
    --green:#46c46a; --green-dk:#2da352;
    --ink:#3d2c1c; --muted:#9b8a78;
    --card:#fffdf8; --pad:#f5efe6; --pad-dk:#e0d3c2;
    --honey:#c79a68; --honey-dk:#a87a4c;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none;}
  html,body{height:100%; margin:0;}
  body{
    font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 55%,#eafbe1 100%);
    overflow:hidden; touch-action:manipulation;
  }
  .sky-deco{position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;}
  .sun{position:absolute; top:-40px; right:-40px; width:160px; height:160px; border-radius:50%;
       background:radial-gradient(circle at 40% 40%,#fff0a8,var(--sun)); box-shadow:0 0 60px #ffe27a;}
  .cloud{position:absolute; background:#fff; border-radius:50px; opacity:.8;}
  .cloud::before,.cloud::after{content:""; position:absolute; background:#fff; border-radius:50%;}
  .c1{width:120px;height:34px;top:90px;left:-30px; animation:drift 40s linear infinite;}
  .c1::before{width:50px;height:50px;top:-20px;left:22px;}
  .c1::after{width:38px;height:38px;top:-14px;left:64px;}
  .c2{width:90px;height:26px;top:180px;right:-20px; animation:drift2 50s linear infinite;}
  .c2::before{width:38px;height:38px;top:-16px;left:18px;}
  .c2::after{width:30px;height:30px;top:-10px;left:48px;}
  @keyframes drift{from{transform:translateX(-60px)}to{transform:translateX(110vw)}}
  @keyframes drift2{from{transform:translateX(60px)}to{transform:translateX(-110vw)}}
  .grass{position:fixed; left:0; right:0; bottom:0; height:70px; z-index:0;
    background:linear-gradient(180deg,var(--grass),var(--grass-dk)); border-radius:50% 50% 0 0 / 28px 28px 0 0;}

  .wrap{position:relative; z-index:1; height:100%; display:flex; flex-direction:column;
        align-items:center; justify-content:center; padding:14px; padding-bottom:78px; overflow-y:auto;}
  .card{width:100%; max-width:540px; background:var(--card); border-radius:30px;
        box-shadow:0 14px 0 rgba(61,44,28,.08), 0 24px 40px rgba(61,44,28,.16);
        padding:20px 18px; text-align:center;}

  h1{font-family:'Fredoka',sans-serif; font-weight:700; margin:4px 0 2px; font-size:32px;}
  .sub{color:var(--muted); font-weight:700; margin:0 0 12px; font-size:15px;}

  .teddy{width:clamp(92px,24vw,122px); height:auto; display:block; margin:0 auto;}
  .teddy.sm{width:64px;}
  .mascot{display:inline-block; transition:transform .2s;}
  .bubble{display:inline-block; background:var(--pad); color:var(--ink); font-weight:800;
          border-radius:18px; padding:9px 15px; margin:6px auto 2px; font-size:17px; max-width:92%;
          box-shadow:inset 0 -3px 0 var(--pad-dk);}

  .name-in{width:100%; font-family:'Fredoka',sans-serif; font-size:19px; text-align:center;
    padding:11px; border-radius:16px; border:3px solid var(--pad-dk); background:var(--pad);
    color:var(--ink); margin:2px 0 12px; outline:none;}
  .name-in:focus{border-color:var(--honey);}

  .level{display:flex; gap:6px; background:var(--pad); border-radius:18px; padding:6px; margin:6px 0 10px;}
  .level button{flex:1; border:none; cursor:pointer; border-radius:13px; padding:10px 4px; font-family:'Fredoka',sans-serif;
    font-weight:600; font-size:15px; color:var(--muted); background:transparent;}
  .level button.on{background:#fff; color:var(--ink); box-shadow:0 3px 8px rgba(61,44,28,.15);}

  .modes{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .mode{position:relative; border:none; cursor:pointer; border-radius:20px; padding:15px 8px 12px;
        background:var(--pad); box-shadow:inset 0 -5px 0 var(--pad-dk); transition:transform .08s;}
  .mode:active{transform:scale(.96);}
  .mode .ic{font-size:32px; display:block; line-height:1;}
  .mode .lbl{font-family:'Fredoka',sans-serif; font-weight:600; font-size:16px; color:var(--ink); margin-top:5px;}
  .mode.wide{grid-column:1 / -1; background:linear-gradient(120deg,#ffe7bf,#ffd79a); box-shadow:inset 0 -5px 0 #f0c479;}
  .mode.feat{background:linear-gradient(120deg,#d3ecff,#aed8ff); box-shadow:inset 0 -5px 0 #8cc4f5;}
  .stepcap{font-family:'Fredoka',sans-serif; font-weight:600; color:var(--muted); font-size:15px; margin-top:6px;}
  .stepcap b{color:var(--ink);}
  .equation.asblock{display:block;}
  .worktask{font-family:'Fredoka',sans-serif; font-weight:700; font-size:clamp(30px,8.5vw,42px); margin:8px 0 8px;}
  .worktask .q{color:var(--honey-dk);}
  .workstep{display:flex; flex-direction:column; gap:1px; background:var(--pad); border-radius:16px; padding:9px 12px; margin:9px 0; opacity:.42; transition:opacity .2s, box-shadow .2s, background .2s;}
  .workstep.active{opacity:1; background:#eaf6ff; box-shadow:inset 0 0 0 3px var(--blue);}
  .workstep.done{opacity:1; background:#e7f8ec;}
  .workstep .shead{display:flex; align-items:center; gap:8px; font-weight:800; font-size:13px; color:var(--muted);}
  .workstep .badge{width:26px;height:26px;border-radius:50%;background:var(--honey);color:#fff;display:inline-flex;
    align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-weight:700;font-size:15px;flex:none;}
  .workstep.active .badge{background:var(--blue);}
  .workstep.done .badge{background:var(--green);}
  .workstep .calc{font-family:'Fredoka',sans-serif; font-weight:600; font-size:clamp(24px,6.5vw,32px); text-align:center; margin-top:3px;}
  .slot.mini{min-width:62px; height:48px; font-size:clamp(22px,6vw,30px); vertical-align:middle;}
  .workresult{font-family:'Fredoka',sans-serif; font-weight:700; font-size:clamp(24px,6.8vw,34px); color:var(--green-dk); margin-top:12px;}

  .btn{font-family:'Fredoka',sans-serif; font-weight:600; border:none; cursor:pointer; color:#fff;
       border-radius:20px; font-size:19px; padding:15px 16px; width:100%; transition:transform .08s,box-shadow .08s; touch-action:manipulation;}
  .btn:active{transform:translateY(4px);}
  .btn-blue{background:var(--blue); box-shadow:0 6px 0 var(--blue-dk);} .btn-blue:active{box-shadow:0 2px 0 var(--blue-dk);}
  .btn-green{background:var(--green); box-shadow:0 6px 0 var(--green-dk);} .btn-green:active{box-shadow:0 2px 0 var(--green-dk);}
  .ghost{background:#fff; color:var(--blue-dk); box-shadow:0 6px 0 var(--pad-dk);} .ghost:active{box-shadow:0 2px 0 var(--pad-dk);}

  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;}
  .iconbtn{background:var(--pad); border:none; border-radius:14px; width:44px; height:44px; font-size:21px;
    cursor:pointer; box-shadow:inset 0 -3px 0 var(--pad-dk);}
  .progress{font-family:'Fredoka',sans-serif; font-weight:600; color:var(--muted); font-size:15px;}
  .stars{font-size:19px; letter-spacing:1px; margin:2px 0 6px; min-height:24px;}
  .star-off{opacity:.28;}

  .equation{font-family:'Fredoka',sans-serif; font-weight:600; font-size:clamp(30px,8.5vw,44px);
    display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:5px; margin:12px 0;}
  .slot{min-width:76px; height:60px; border-radius:16px; background:var(--pad);
    border:3px dashed var(--pad-dk); display:inline-flex; align-items:center; justify-content:center; padding:0 8px;}
  .slot.empty{color:var(--muted);}
  .slot.good{background:#dff7e4; border-color:var(--green); border-style:solid; color:var(--green-dk);}
  .slot.bad{background:#ffe2dd; border-color:var(--coral); border-style:solid; color:var(--coral-dk);}
  .caret{display:inline-block; width:3px; height:32px; background:var(--honey); margin-left:1px; border-radius:2px; animation:blink 1s step-end infinite;}
  @keyframes blink{50%{opacity:0}}

  .tip{background:#fff6da; color:#7a5b14; border-radius:16px; padding:11px 13px; font-weight:700;
    font-size:15px; margin:6px 0 2px; box-shadow:inset 0 -3px 0 #f0e2ac; display:none;}

  .keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-top:12px;}
  .key{font-family:'Fredoka',sans-serif; font-weight:600; font-size:26px; border:none; cursor:pointer;
    border-radius:18px; padding:15px 0; background:#fff; color:var(--ink);
    box-shadow:0 5px 0 var(--pad-dk), 0 6px 10px rgba(61,44,28,.08); transition:transform .07s,box-shadow .07s;}
  .key:active{transform:translateY(4px); box-shadow:0 1px 0 var(--pad-dk);}
  .key.del{background:#fff0ee; color:var(--coral-dk); box-shadow:0 5px 0 #f3cdc7;}
  .key.ok{background:var(--green); color:#fff; box-shadow:0 5px 0 var(--green-dk);} .key.ok:active{box-shadow:0 1px 0 var(--green-dk);}

  .row-actions{display:flex; gap:10px; margin-top:12px;}
  .hide{display:none !important;}
  .shake{animation:shake .4s;} @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
  .hop{animation:hop .5s;} @keyframes hop{0%,100%{transform:translateY(0)}30%{transform:translateY(-22px)}55%{transform:translateY(0)}70%{transform:translateY(-8px)}}

  .confetti{position:fixed; top:-40px; z-index:5; font-size:26px; pointer-events:none; animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(360deg); opacity:.9;}}
  .score-big{font-family:'Fredoka',sans-serif; font-weight:700; font-size:28px; margin:6px 0;}

  /* Tabelle */
  .rtable{border-collapse:separate; border-spacing:6px; margin:8px auto;}
  .rtable th{font-family:'Fredoka',sans-serif; font-weight:600; background:#fbeede; color:var(--ink);
    border-radius:12px; min-width:50px; height:48px; font-size:19px;}
  .rtable th.corner{background:var(--honey); color:#fff; font-size:24px;}
  .cell{min-width:58px; height:50px; border-radius:12px; border:3px dashed var(--pad-dk); background:var(--pad);
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:22px; color:var(--muted); cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center; padding:0 6px;}
  .cell.active{border-style:solid; border-color:var(--blue); background:#eaf6ff; color:var(--ink);}
  .cell.solved{border-style:solid; border-color:var(--green); background:#dff7e4; color:var(--green-dk); cursor:default;}

  /* Zahlenhaus */
  .house{margin:2px auto 8px;}
  .house .top{width:88px;height:50px;margin:0 auto;background:#fff2c9;border-radius:12px;
    display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-weight:600;
    font-size:25px;box-shadow:inset 0 -4px 0 #f0d98a;}
  .house .roof{font-size:13px;color:var(--muted);font-weight:800;margin-bottom:3px;}
  .house .bottom{display:flex;gap:10px;margin-top:8px;justify-content:center;}
  .house .part{width:88px;height:48px;background:#fde3dc;border-radius:12px;display:flex;align-items:center;
    justify-content:center;font-family:'Fredoka',sans-serif;font-weight:600;font-size:23px;box-shadow:inset 0 -4px 0 #f3c3b8;}
  .feq{display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Fredoka',sans-serif;
    font-weight:600;font-size:25px;margin:7px 0;}
</style>
</head>
<body>
  <div class="sky-deco"><div class="sun"></div><div class="cloud c1"></div><div class="cloud c2"></div></div>
  <div class="grass"></div>

  <div class="wrap">

    <!-- ===== MEN√Ь ===== -->
    <div id="screen-menu" class="card">
      <div class="mascot" id="menuTeddy"></div>
      <h1>Rechen-B√§r</h1>
      <p class="sub">√Ьben macht stark вАУ los geht's!</p>

      <input id="nameInput" class="name-in" maxlength="14" placeholder="Wie hei√Яt du? (kann leer bleiben)">

      <div class="level">
        <button id="lvl1" class="on" onclick="setLevel(1)">рЯШК Leicht</button>
        <button id="lvl2" onclick="setLevel(2)">рЯЩВ Mittel</button>
        <button id="lvl3" onclick="setLevel(3)">рЯТ™ Schwer</button>
      </div>

      <div class="modes">
        <button class="mode" onclick="pickMode('plus')"><span class="ic">вЮХ</span><span class="lbl">Plus</span></button>
        <button class="mode" onclick="pickMode('minus')"><span class="ic">вЮЦ</span><span class="lbl">Minus</span></button>
        <button class="mode" onclick="pickMode('mal')"><span class="ic">вЬЦпЄП</span><span class="lbl">Malnehmen</span></button>
        <button class="mode" onclick="pickMode('fehlt')"><span class="ic">вЭУ</span><span class="lbl">Was fehlt?</span></button>
        <button class="mode" onclick="pickMode('tabelle')"><span class="ic">рЯФҐ</span><span class="lbl">Rechentabelle</span></button>
        <button class="mode" onclick="pickMode('tausch')"><span class="ic">рЯФБ</span><span class="lbl">Tausch &amp; Umkehr</span></button>
        <button class="mode wide feat" onclick="pickMode('schritt')"><span class="ic">рЯ™Ь</span><span class="lbl">Schritt f√Љr Schritt (Zehner√Љbergang)</span></button>
        <button class="mode wide" onclick="pickMode('mix')"><span class="ic">рЯО≤</span><span class="lbl">Alles gemischt</span></button>
      </div>
      <div style="margin-top:10px;">
        <button id="soundToggle" class="iconbtn" onclick="toggleSound()" title="Ton an/aus">рЯФК</button>
      </div>
    </div>

    <!-- ===== SPIEL (10 Aufgaben) ===== -->
    <div id="screen-game" class="card hide">
      <div class="topbar">
        <button class="iconbtn" onclick="backToMenu()">рЯП†</button>
        <span class="progress" id="progress">Frage 1 von 10</span>
        <button class="iconbtn" onclick="toggleSound()" id="soundToggle2">рЯФК</button>
      </div>
      <div class="stars" id="stars"></div>
      <div class="mascot" id="frog"></div>
      <div class="bubble" id="bubble">Schaffst du das? рЯШК</div>
      <div class="stepcap" id="stepCaption" style="display:none;"></div>
      <div class="equation" id="equation"></div>
      <div class="tip" id="tip"></div>
      <div class="keypad" id="keypad">
        <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button>
        <button class="key" onclick="press('4')">4</button><button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button>
        <button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button><button class="key" onclick="press('9')">9</button>
        <button class="key del" onclick="backspace()">вМЂ</button><button class="key" onclick="press('0')">0</button><button class="key ok" onclick="check()">вЬУ</button>
      </div>
      <div class="row-actions" id="afterRow" style="display:none;">
        <button class="btn ghost" onclick="showTip()">рЯТ° Tipp</button>
        <button class="btn btn-green" onclick="nextQuestion()">Weiter вЮЬ</button>
      </div>
    </div>

    <!-- ===== BRETT (Tabelle / Aufgabenfamilie) ===== -->
    <div id="screen-board" class="card hide">
      <div class="topbar">
        <button class="iconbtn" onclick="backToMenu()">рЯП†</button>
        <span class="progress" id="boardProgress"></span>
        <button class="iconbtn" onclick="toggleSound()" id="soundToggle3">рЯФК</button>
      </div>
      <div style="display:flex; align-items:center; gap:10px; justify-content:center; margin:2px 0 4px;">
        <div class="mascot" id="frog2"></div>
        <div class="bubble" id="bubble2">Tippe ein Feld an! вШЭпЄП</div>
      </div>
      <div id="boardArea"></div>
      <div class="tip" id="tip2"></div>
      <div class="keypad" id="keypad2">
        <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button>
        <button class="key" onclick="press('4')">4</button><button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button>
        <button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button><button class="key" onclick="press('9')">9</button>
        <button class="key del" onclick="backspace()">вМЂ</button><button class="key" onclick="press('0')">0</button><button class="key ok" onclick="check()">вЬУ</button>
      </div>
    </div>

    <!-- ===== ENDE ===== -->
    <div id="screen-end" class="card hide">
      <div class="mascot" id="endTeddy"></div>
      <h1 id="endTitle">Geschafft!</h1>
      <div class="score-big" id="endScore">в≠Р 0 von 10</div>
      <p class="sub" id="endMsg"></p>
      <div style="display:grid; gap:10px; margin-top:6px;">
        <button class="btn btn-green" onclick="replay()">рЯФБ Nochmal √Љben</button>
        <button class="btn btn-blue" onclick="backToMenu()">рЯП† Zum Men√Љ</button>
      </div>
    </div>

  </div>

<script>
/* ===================== Teddy (SVG, Steiff-Stil) ===================== */
function teddy(s){
  var ears='<circle cx="58" cy="52" r="26" fill="#b9895a"/><circle cx="58" cy="52" r="13" fill="#d9b785"/>'
          +'<circle cx="142" cy="52" r="26" fill="#b9895a"/><circle cx="142" cy="52" r="13" fill="#d9b785"/>';
  var button='<circle cx="49" cy="44" r="5" fill="#cfd3d8" stroke="#9aa0a8" stroke-width="1.5"/>'
            +'<circle cx="49" cy="44" r="1.6" fill="#9aa0a8"/>';
  var body='<ellipse cx="100" cy="194" rx="48" ry="30" fill="#bd8f5f"/>';
  var head='<ellipse cx="100" cy="102" rx="60" ry="56" fill="#c79a68"/>'
          +'<ellipse cx="100" cy="84" rx="44" ry="30" fill="#d2a877" opacity="0.55"/>';
  var muzzle='<ellipse cx="100" cy="118" rx="36" ry="27" fill="#e7cda0"/>';
  var nose='<ellipse cx="100" cy="106" rx="13" ry="9.5" fill="#3a2a1c"/>'
          +'<ellipse cx="95.5" cy="103" rx="3.4" ry="2.3" fill="#6f5638"/>';
  var ribbon='<path d="M100 162 L70 150 L70 178 Z" fill="#d6452f"/>'
            +'<path d="M100 162 L130 150 L130 178 Z" fill="#d6452f"/>'
            +'<circle cx="100" cy="163" r="8" fill="#b8351f"/>';

  var eyesOpen='<circle cx="76" cy="94" r="8" fill="#241910"/><circle cx="124" cy="94" r="8" fill="#241910"/>'
              +'<circle cx="78.6" cy="91" r="2.6" fill="#fff"/><circle cx="126.6" cy="91" r="2.6" fill="#fff"/>';
  var eyesUp='<circle cx="76" cy="94" r="8" fill="#241910"/><circle cx="124" cy="94" r="8" fill="#241910"/>'
            +'<circle cx="76" cy="90.5" r="2.6" fill="#fff"/><circle cx="124" cy="90.5" r="2.6" fill="#fff"/>';
  var eyesHappy='<path d="M68 96 q8 -9 16 0" stroke="#241910" stroke-width="4.5" fill="none" stroke-linecap="round"/>'
               +'<path d="M116 96 q8 -9 16 0" stroke="#241910" stroke-width="4.5" fill="none" stroke-linecap="round"/>';

  var mouthY='<path d="M100 115 V126" stroke="#3a2a1c" stroke-width="3.5" fill="none" stroke-linecap="round"/>'
            +'<path d="M100 126 q-11 8 -19 -2" stroke="#3a2a1c" stroke-width="3.5" fill="none" stroke-linecap="round"/>'
            +'<path d="M100 126 q11 8 19 -2" stroke="#3a2a1c" stroke-width="3.5" fill="none" stroke-linecap="round"/>';
  var mouthSoft='<path d="M100 115 V123" stroke="#3a2a1c" stroke-width="3.5" fill="none" stroke-linecap="round"/>'
               +'<path d="M84 124 q16 12 32 0" stroke="#3a2a1c" stroke-width="3.5" fill="none" stroke-linecap="round"/>';
  var mouthOpen='<path d="M100 114 V120" stroke="#3a2a1c" stroke-width="3.5" fill="none" stroke-linecap="round"/>'
               +'<path d="M80 122 Q100 144 120 122 Q100 130 80 122 Z" fill="#a14a32"/>'
               +'<path d="M88 127 Q100 133 112 127" fill="#d76b8e" opacity="0.85"/>';
  var mouthFlat='<path d="M100 115 V124" stroke="#3a2a1c" stroke-width="3.5" fill="none" stroke-linecap="round"/>'
               +'<path d="M86 128 H114" stroke="#3a2a1c" stroke-width="3.5" fill="none" stroke-linecap="round"/>';
  var sweat='<path d="M152 84 q-6 9 0 14 q6 -5 0 -14 Z" fill="#7fd3ff" stroke="#4fb6e6" stroke-width="1"/>';

  var eyes=eyesOpen, mouth=mouthY, extra='';
  if(s==='happy'){eyes=eyesHappy; mouth=mouthOpen;}
  else if(s==='think'){eyes=eyesUp; mouth=mouthFlat; extra=sweat;}
  else if(s==='kind'){eyes=eyesOpen; mouth=mouthSoft;}

  return '<svg class="teddy" viewBox="0 0 200 214" xmlns="http://www.w3.org/2000/svg">'
    + body + ears + button + head + muzzle + nose + eyes + mouth + extra + ribbon + '</svg>';
}

/* ===================== Zustand ===================== */
var ROUND=10;
var state={mode:'plus',level:1,name:'',soundOn:true,idx:0,score:0,attempts:0,answer:'',current:null,locked:false};
var board=null;

function rnd(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function sampleDistinct(arr,k){var c=arr.slice(),out=[];while(out.length<k&&c.length){out.push(c.splice(Math.floor(Math.random()*c.length),1)[0]);}return out;}
function show(id){document.getElementById(id).classList.remove('hide');}
function hideEl(id){document.getElementById(id).classList.add('hide');}

/* ===================== Ton ===================== */
var actx=null;
function beep(freqs,dur){
  if(!state.soundOn)return;
  try{
    if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();
    var t=actx.currentTime;
    freqs.forEach(function(f,i){
      var o=actx.createOscillator(),g=actx.createGain();
      o.type='sine'; o.frequency.value=f; o.connect(g); g.connect(actx.destination);
      var st=t+i*0.11;
      g.gain.setValueAtTime(0.0001,st);
      g.gain.exponentialRampToValueAtTime(0.25,st+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,st+dur);
      o.start(st); o.stop(st+dur+0.02);
    });
  }catch(e){}
}
function sndGood(){beep([660,880],0.18);}
function sndWin(){beep([523,659,784,1046],0.2);}
function sndOops(){beep([300,230],0.22);}
function toggleSound(){
  state.soundOn=!state.soundOn;
  var ic=state.soundOn?'рЯФК':'рЯФЗ';
  ['soundToggle','soundToggle2','soundToggle3'].forEach(function(id){var e=document.getElementById(id); if(e)e.textContent=ic;});
  if(state.soundOn)sndGood();
}
function setLevel(n){state.level=n;[1,2,3].forEach(function(i){document.getElementById('lvl'+i).classList.toggle('on',i===n);});}
function ensureAudio(){ if(actx&&actx.state==='suspended')actx.resume(); if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}} }

/* ===================== Tipps ===================== */
function tipPlus(a,b,ans){var bT=Math.floor(b/10)*10,bO=b%10;return bO===0?('Tipp: '+a+' + '+bT+' = '+ans+'.'):('Tipp: '+a+' + '+bT+' = '+(a+bT)+', dann + '+bO+' = '+ans+'.');}
function tipMinus(a,b,ans){var bT=Math.floor(b/10)*10,bO=b%10;return bO===0?('Tipp: '+a+' вИТ '+bT+' = '+ans+'.'):('Tipp: '+a+' вИТ '+bT+' = '+(a-bT)+', dann вИТ '+bO+' = '+ans+'.');}
function tipMal(n,m,ans){return 'Tipp: '+n+' ¬Ј '+m+' hei√Яt '+n+', '+m+'-mal. Z√§hle in '+n+'er-Schritten: вА¶ = '+ans+'.';}

/* ===================== Aufgaben (Spiel-Modus) ===================== */
function genQuestion(mode){
  var L=state.level,t=0;
  if(mode==='plus'){
    while(t++<500){var a=rnd(11,(L>=2?69:55)),b=rnd(11,49);if(a+b>100)continue;var c=(a%10+b%10)>=10;if(L===1&&c)continue;if(L===3&&!c)continue;var ans=a+b;return{left:a+' + '+b+' = ',right:'',answer:ans,tip:tipPlus(a,b,ans)};}
  }
  if(mode==='minus'){
    while(t++<500){var a=rnd(22,100),b=rnd(11,a-1);var br=(a%10)<(b%10);if(L===1&&br)continue;if(L===3&&!br)continue;var ans=a-b;if(ans<1)continue;return{left:a+' вИТ '+b+' = ',right:'',answer:ans,tip:tipMinus(a,b,ans)};}
  }
  if(mode==='mal'){
    var bases=(L===3)?[4,6,9,10,3]:[2,3,4,5,6,9,10];
    var n=pick(bases),m=(L===1?rnd(2,5):rnd(2,10)),ans=n*m;
    return{left:n+' ¬Ј '+m+' = ',right:'',answer:ans,tip:tipMal(n,m,ans)};
  }
  if(mode==='fehlt'){
    var kind=pick(['add','sub1','sub2']);
    var xr=(L===1?[2,9]:(L===2?[6,25]:[11,40]));
    if(kind==='add'){while(t++<500){var a=rnd(10,70),x=rnd(xr[0],xr[1]),c=a+x;if(c>100)continue;return{left:a+' + ',right:' = '+c,answer:x,tip:'Tipp: Von '+a+' bis '+c+': '+c+' вИТ '+a+' = '+x+'.'};}}
    else if(kind==='sub1'){while(t++<500){var c=rnd(30,100),x=rnd(xr[0],xr[1]),a=c-x;if(a<1)continue;return{left:c+' вИТ ',right:' = '+a,answer:x,tip:'Tipp: '+c+' вИТ '+a+' = '+x+'.'};}}
    else{while(t++<500){var b=rnd(xr[0],xr[1]),a=rnd(10,60),x=a+b;if(x>100)continue;return{left:'',right:' вИТ '+b+' = '+a,answer:x,tip:'Tipp: '+a+' + '+b+' = '+x+'.'};}}
  }
  var fa=rnd(10,40),fb=rnd(10,40);return{left:fa+' + '+fb+' = ',right:'',answer:fa+fb,tip:tipPlus(fa,fb,fa+fb)};
}

/* ===================== Schritt-f√Љr-Schritt (Zehner√Љbergang) ===================== */
function genSchritt(){
  var L=state.level, op=pick(['+','-']), t=0, a, b;
  if(op==='+'){
    while(t++<800){
      a=rnd(12,(L===1?29:(L===2?49:69)));
      b=rnd(13,(L===1?29:49));
      if(a+b>100)continue;
      if((a%10)+(b%10)<10)continue;        // Zehner√Љbergang erzwingen
      break;
    }
  }else{
    while(t++<800){
      a=rnd(22,(L===1?59:100));
      b=rnd(13,a-1);
      if((a%10)>=(b%10))continue;          // Abw√§rts-√Ьbergang erzwingen
      if(a-b<1)continue;
      break;
    }
  }
  var bT=Math.floor(b/10)*10, bO=b%10;
  var s1=(op==='+')?(a+bT):(a-bT);
  var fin=(op==='+')?(a+b):(a-b);
  var sym=(op==='+')?'+':'вИТ';
  var l1=(op==='+')?'Zehner dazu':'Zehner weg';
  var l2=(op==='+')?'√Љber den Zehner вђЖпЄП':'unter den Zehner вђЗпЄП';
  return {schritt:true, op:op, a:a, b:b, bT:bT, bO:bO, s1:s1, fin:fin, sym:sym, l1:l1, l2:l2};
}
function startSchritt(){
  var c=state.current;
  c.phase=1; c.step1Solved=false; c.step2Solved=false; c.expected=c.s1;
  c.tip='Tipp: Erst die Zehner вАУ '+c.a+' '+c.sym+' '+c.bT+' = '+c.s1+'.';
  state.answer=''; state.attempts=0; state.locked=false;
  document.getElementById('stepCaption').style.display='none';
  setMascot('idle','Rechne in 2 Schritten вАУ erst die Zehner. рЯШК');
  renderSchritt('input');
}
function gotoSchrittPhase2(){
  var c=state.current;
  c.phase=2; c.step1Solved=true; c.expected=c.fin;
  c.tip='Tipp: Jetzt '+(c.op==='+'?'√Љber':'unter')+' den Zehner вАУ '+c.s1+' '+c.sym+' '+c.bO+' = '+c.fin+'.';
  state.answer=''; state.attempts=0; state.locked=false;
  setMascot('idle', c.op==='+'?'Jetzt √Љber den Zehner! вђЖпЄП':'Jetzt unter den Zehner! вђЗпЄП');
  renderSchritt('input');
}
function schrittSlot(st,val){
  if(st==='done'||st==='good') return '<span class="slot mini good">'+val+'</span>';
  if(st==='bad') return '<span class="slot mini bad">'+val+'</span>';
  if(st==='input') return '<span class="slot mini'+(state.answer===''?' empty':'')+'">'+(state.answer!==''?state.answer:'<span class="caret"></span>')+'</span>';
  return '<span class="slot mini empty">вЦҐ</span>';
}
function renderSchritt(slotState){
  var c=state.current;
  var s1st = c.step1Solved ? 'done' : (c.phase===1 ? slotState : 'wait');
  var s2st = c.step2Solved ? 'done' : (c.phase===2 ? slotState : 'wait');
  var rowcls=function(solved,active){return 'workstep'+(solved?' done':(active?' active':''));};
  var headRes = c.step2Solved ? c.fin : '?';
  var leftVal2 = c.step1Solved ? c.s1 : 'вА¶';
  var html='<div class="worktask">'+c.a+' '+c.sym+' '+c.b+' = <span class="q">'+headRes+'</span></div>';
  html+='<div class="'+rowcls(c.step1Solved, c.phase===1&&!c.step1Solved)+'">'
      +'<div class="shead"><span class="badge">1</span> '+c.l1+'</div>'
      +'<div class="calc">'+c.a+' '+c.sym+' '+c.bT+' = '+schrittSlot(s1st,c.s1)+'</div></div>';
  html+='<div class="'+rowcls(c.step2Solved, c.phase===2&&!c.step2Solved)+'">'
      +'<div class="shead"><span class="badge">2</span> '+c.l2+'</div>'
      +'<div class="calc">'+leftVal2+' '+c.sym+' '+c.bO+' = '+schrittSlot(s2st,c.fin)+'</div></div>';
  if(c.step2Solved){ html+='<div class="workresult">'+c.a+' '+c.sym+' '+c.b+' = '+c.fin+' рЯОЙ</div>'; }
  document.getElementById('equation').innerHTML=html;
}

/* ===================== Routing ===================== */
function pickMode(mode){
  state.mode=mode;
  state.name=(document.getElementById('nameInput').value||'').trim();
  ensureAudio();
  if(mode==='tabelle'||mode==='tausch'){ startBoard(mode); }
  else { startGame(mode); }
}

/* ===================== Spiel-Modus ===================== */
var praise=['Super! рЯМЯ','Bravo! рЯОЙ','Toll gemacht! рЯСП','Spitze! рЯТЪ','Stark! рЯТ™','Richtig! вЬ®','Klasse! рЯРї'];
function startGame(){
  state.idx=0; state.score=0;
  hideEl('screen-menu'); hideEl('screen-end'); hideEl('screen-board'); show('screen-game');
  document.getElementById('soundToggle2').textContent=state.soundOn?'рЯФК':'рЯФЗ';
  renderStars(); nextQuestion();
}
function nextQuestion(){
  if(state.idx>=ROUND){ showEnd(state.score,ROUND); return; }
  if(state.mode==='schritt'){
    state.current=genSchritt();
    state.attempts=0; state.answer=''; state.locked=false;
    document.getElementById('tip').style.display='none';
    document.getElementById('afterRow').style.display='none';
    document.getElementById('keypad').classList.remove('hide');
    document.getElementById('progress').textContent='Frage '+(state.idx+1)+' von '+ROUND;
    document.getElementById('equation').classList.add('asblock');
    startSchritt();
    return;
  }
  document.getElementById('stepCaption').style.display='none';
  document.getElementById('equation').classList.remove('asblock');
  var mode=state.mode==='mix'?pick(['plus','minus','mal','fehlt']):state.mode;
  state.current=genQuestion(mode);
  state.attempts=0; state.answer=''; state.locked=false;
  document.getElementById('tip').style.display='none';
  document.getElementById('afterRow').style.display='none';
  document.getElementById('keypad').classList.remove('hide');
  document.getElementById('progress').textContent='Frage '+(state.idx+1)+' von '+ROUND;
  setMascot('idle', state.name?('Du schaffst das, '+state.name+'! рЯШК'):'Schaffst du das? рЯШК');
  renderEquation('input');
}
function renderStars(){var s='';for(var i=0;i<ROUND;i++){s+= i<state.score?'в≠Р':'<span class="star-off">вШЖ</span>';}document.getElementById('stars').innerHTML=s;}
function renderEquation(st){
  var c=state.current,inner,cls;
  var correctVal = c.schritt ? c.expected : c.answer;
  if(st==='good'||st==='bad'){inner=correctVal; cls='slot '+st;}
  else{inner=state.answer!==''?state.answer:'<span class="caret"></span>'; cls=state.answer===''?'slot empty':'slot';}
  document.getElementById('equation').innerHTML='<span>'+c.left+'</span><span class="'+cls+'">'+inner+'</span><span>'+c.right+'</span>';
}
function setMascot(stateName,text){document.getElementById('frog').innerHTML=teddy(stateName);document.getElementById('bubble').textContent=text;}

/* ===================== Eingabe (geteilt) ===================== */
function press(d){
  if(state.mode==='tabelle'||state.mode==='tausch'){return boardPress(d);}
  if(state.locked)return;
  if(state.answer.length>=3)return;
  if(state.answer===''&&d==='0')return;
  state.answer+=d;
  if(state.mode==='schritt')renderSchritt('input'); else renderEquation('input');
}
function backspace(){
  if(state.mode==='tabelle'||state.mode==='tausch'){return boardBack();}
  if(state.locked)return; state.answer=state.answer.slice(0,-1);
  if(state.mode==='schritt')renderSchritt('input'); else renderEquation('input');
}
function check(){
  if(state.mode==='tabelle'||state.mode==='tausch'){return checkBoard();}
  if(state.locked)return;
  if(state.answer===''){wiggle('equation');return;}
  var sch=state.current.schritt;
  var val=parseInt(state.answer,10); state.attempts++;
  var expected = sch ? state.current.expected : state.current.answer;
  if(val===expected){
    if(sch && state.current.phase===1){
      state.locked=true; sndGood(); setMascot('happy','Genau! вЬ®'); renderSchritt('good');
      setTimeout(gotoSchrittPhase2,850); return;
    }
    state.locked=true; state.score++; renderStars();
    if(sch){ state.current.step2Solved=true; renderSchritt('good'); } else { renderEquation('good'); }
    document.getElementById('frog').classList.add('hop'); setMascot('happy',pick(praise)); sndGood(); confettiBurst(8);
    document.getElementById('keypad').classList.add('hide');
    setTimeout(function(){document.getElementById('frog').classList.remove('hop'); state.idx++; nextQuestion();}, sch?1300:1000);
  }else{
    sndOops();
    if(state.attempts<2){
      setMascot('think','Hoppla! Probier nochmal. рЯРї');
      wiggle('equation'); setTimeout(function(){state.answer=''; if(sch)renderSchritt('input'); else renderEquation('input');},450);
    }else{ reveal(); }
  }
}
function reveal(){
  var sch=state.current.schritt;
  if(sch && state.current.phase===1){
    state.locked=true; renderSchritt('bad');
    setMascot('kind','Schritt 1 ist '+state.current.s1+'. Weiter geht\'s!');
    setTimeout(gotoSchrittPhase2,1300); return;
  }
  state.locked=true; state.idx++;
  if(sch){ renderSchritt('bad'); } else { renderEquation('bad'); }
  var loesung = sch ? state.current.fin : state.current.answer;
  setMascot('kind',(state.name?(state.name+', '):'')+'macht nix! Die L√ґsung ist '+loesung+'.');
  document.getElementById('keypad').classList.add('hide');
  document.getElementById('afterRow').style.display='flex';
}
function showTip(){var t=document.getElementById('tip'); t.textContent=state.current.tip; t.style.display='block';}
function wiggle(id){var e=document.getElementById(id); e.classList.add('shake'); setTimeout(function(){e.classList.remove('shake');},450);}

/* ===================== Brett-Modus (Tabelle & Aufgabenfamilie) ===================== */
function startBoard(mode){
  hideEl('screen-menu'); hideEl('screen-end'); hideEl('screen-game'); show('screen-board');
  document.getElementById('soundToggle3').textContent=state.soundOn?'рЯФК':'рЯФЗ';
  document.getElementById('tip2').style.display='none';
  board={mode:mode,items:[],activeId:null,answer:'',firstTry:0,grandTotal:0,familyIndex:0,solvedCount:0};
  if(mode==='tabelle'){ buildTable(); }
  else { board.grandTotal=12; loadFamily(0); }
  setBoardMascot('idle','Tippe ein Feld an! вШЭпЄП');
}
function setBoardMascot(s,text){document.getElementById('frog2').innerHTML=teddy(s);document.getElementById('frog2').firstChild&&document.getElementById('frog2').firstChild.classList.add('sm');document.getElementById('bubble2').textContent=text;}

function newItem(left,right,ans){return {id:'i'+board.items.length,left:left,right:right,ans:ans,solved:false,attempts:0};}
function cellHTML(it){
  var cls='cell'+(it.solved?' solved':'')+(board.activeId===it.id?' active':'');
  var inner;
  if(it.solved){inner=it.ans;}
  else if(board.activeId===it.id){inner=board.answer!==''?board.answer:'<span class="caret"></span>';}
  else{inner='вЦҐ';}
  return '<span class="'+cls+'" onclick="selectFill(\''+it.id+'\')">'+inner+'</span>';
}

function buildTable(){
  var L=state.level, op=pick(['+','-']);
  var n=(L===1?2:3), m=(L===1?2:3);
  var rows,cols;
  if(op==='+'){
    var range=(L===3?[14,46]:(L===2?[12,38]:[11,29]));
    rows=sampleDistinct(rangeList(range[0],range[1]),n);
    cols=sampleDistinct(rangeList(range[0],range[1]),m);
    // sicherstellen: jede Summe вЙ§ 100
    var maxR=Math.max.apply(null,rows),maxC=Math.max.apply(null,cols);
    while(maxR+maxC>100){ cols=cols.map(function(v){return Math.max(11,v-5);}); maxC=Math.max.apply(null,cols); }
  }else{
    var cr=(L===3?[14,34]:(L===2?[12,28]:[11,19]));
    cols=sampleDistinct(rangeList(cr[0],cr[1]),m);
    var maxC2=Math.max.apply(null,cols);
    rows=sampleDistinct(rangeList(maxC2+8,99),n); // jede Zeile gr√ґ√Яer als jeder Spaltenkopf
  }
  board.items=[];
  var html='<table class="rtable"><tr><th class="corner">'+(op==='+'?'+':'вИТ')+'</th>';
  cols.forEach(function(c){html+='<th>'+c+'</th>';});
  html+='</tr>';
  rows.forEach(function(r){
    html+='<tr><th>'+r+'</th>';
    cols.forEach(function(c){
      var ans=(op==='+')?(r+c):(r-c);
      var it=newItem('','',ans); board.items.push(it);
      html+='<td>'+cellHTML(it)+'</td>';
    });
    html+='</tr>';
  });
  html+='</table>';
  board.grandTotal=board.items.length;
  document.getElementById('boardArea').innerHTML=html;
  updateBoardProgress();
}
function rangeList(a,b){var o=[];for(var i=a;i<=b;i++)o.push(i);return o;}

function loadFamily(i){
  board.familyIndex=i;
  var L=state.level,t=0,p1,p2,whole;
  while(t++<600){
    p1=rnd(11,(L>=2?59:39)); p2=rnd(11,(L>=2?49:39)); whole=p1+p2;
    if(whole>100)continue;
    var cross=(p1%10+p2%10)>=10;
    if(L===1&&cross)continue;
    if(L===3&&!cross)continue;
    break;
  }
  board.items=[];
  var i1=newItem(p1+' + '+p2+' = ','',whole);
  var i2=newItem(p2+' + '+p1+' = ','',whole);
  var i3=newItem(whole+' вИТ '+p1+' = ','',p2);
  var i4=newItem(whole+' вИТ '+p2+' = ','',p1);
  board.items=[i1,i2,i3,i4];
  board.activeId=null; board.answer='';
  var html='<div class="house"><div class="roof">das Ganze</div><div class="top">'+whole+'</div>'
          +'<div class="bottom"><div class="part">'+p1+'</div><div class="part">'+p2+'</div></div></div>';
  board.items.forEach(function(it){
    html+='<div class="feq"><span>'+it.left+'</span>'+cellHTML(it)+'</div>';
  });
  document.getElementById('boardArea').innerHTML=html;
  updateBoardProgress();
}

function updateBoardProgress(){
  var solved=board.items.filter(function(x){return x.solved;}).length;
  if(board.mode==='tabelle'){
    document.getElementById('boardProgress').textContent='Tabelle ¬Ј '+solved+' / '+board.items.length+' вЬУ';
  }else{
    document.getElementById('boardProgress').textContent='Familie '+(board.familyIndex+1)+' von 3';
  }
}
function rerenderBoard(){
  // alle Zellen neu zeichnen (einfacher als Einzel-Update)
  var spans=document.querySelectorAll('#boardArea .cell');
  spans.forEach(function(sp){
    var id=sp.getAttribute('onclick').match(/'(i\d+)'/)[1];
    var it=board.items.filter(function(x){return x.id===id;})[0];
    var cls='cell'+(it.solved?' solved':'')+(board.activeId===it.id?' active':'');
    sp.className=cls;
    if(it.solved)sp.innerHTML=it.ans;
    else if(board.activeId===it.id)sp.innerHTML=board.answer!==''?board.answer:'<span class="caret"></span>';
    else sp.innerHTML='вЦҐ';
  });
}
function selectFill(id){
  var it=board.items.filter(function(x){return x.id===id;})[0];
  if(!it||it.solved)return;
  board.activeId=id; board.answer=''; rerenderBoard();
}
function boardPress(d){
  if(board.activeId===null){setBoardMascot('think','Tippe zuerst ein Feld an. вШЭпЄП');return;}
  if(board.answer.length>=3)return;
  if(board.answer===''&&d==='0')return;
  board.answer+=d; rerenderBoard();
}
function boardBack(){ if(board.activeId===null)return; board.answer=board.answer.slice(0,-1); rerenderBoard(); }
function checkBoard(){
  if(board.activeId===null){setBoardMascot('think','Tippe zuerst ein Feld an. вШЭпЄП');return;}
  if(board.answer===''){wiggle('boardArea');return;}
  var it=board.items.filter(function(x){return x.id===board.activeId;})[0];
  var val=parseInt(board.answer,10); it.attempts++;
  if(val===it.ans){
    it.solved=true; if(it.attempts===1)board.firstTry++;
    board.activeId=null; board.answer=''; rerenderBoard(); updateBoardProgress();
    sndGood(); setBoardMascot('happy',pick(praise)); confettiBurst(6);
    afterBoardSolve();
  }else{
    sndOops();
    if(it.attempts>=3){
      it.solved=true; board.activeId=null; board.answer=''; rerenderBoard(); updateBoardProgress();
      setBoardMascot('kind','Die L√ґsung war '+it.ans+'. Weiter geht\'s!');
      afterBoardSolve();
    }else{
      setBoardMascot('think','Fast! Probier nochmal. рЯРї'); wiggle('boardArea');
    }
  }
}
function afterBoardSolve(){
  var allSolved=board.items.every(function(x){return x.solved;});
  if(!allSolved)return;
  if(board.mode==='tabelle'){
    setTimeout(function(){showEnd(board.firstTry,board.grandTotal);},700);
  }else{
    if(board.familyIndex<2){
      setTimeout(function(){loadFamily(board.familyIndex+1); setBoardMascot('idle','N√§chstes Zahlenhaus! рЯП†');},800);
    }else{
      setTimeout(function(){showEnd(board.firstTry,board.grandTotal);},700);
    }
  }
}

/* ===================== Ende ===================== */
function showEnd(score,total){
  hideEl('screen-game'); hideEl('screen-board'); show('screen-end');
  document.getElementById('endScore').textContent='в≠Р '+score+' von '+total;
  var pct=total>0?score/total:0, title,msg, mascot='happy';
  var who=state.name?state.name+', ':'';
  if(pct>=1){title='PERFEKT!'; msg=who+'du bist ein echter Rechen-Profi!'; mascot='happy';}
  else if(pct>=0.8){title='Super gemacht!'; msg=who+'das war richtig stark!'; mascot='happy';}
  else if(pct>=0.5){title='Gut gemacht!'; msg=who+'weiter so вАУ du wirst immer besser!'; mascot='kind';}
  else{title='Sch√ґn ge√Љbt!'; msg='Jede √Ьbung macht dich st√§rker. Probier es gleich nochmal!'; mascot='kind';}
  document.getElementById('endTeddy').innerHTML=teddy(mascot);
  document.getElementById('endTitle').textContent=title;
  document.getElementById('endMsg').textContent=msg;
  sndWin(); if(pct>=0.5)confettiBurst(40);
}
function replay(){ pickMode(state.mode); }
function backToMenu(){ hideEl('screen-game'); hideEl('screen-board'); hideEl('screen-end'); show('screen-menu'); }

/* ===================== Konfetti ===================== */
function confettiBurst(n){
  var icons=['в≠Р','рЯОЙ','рЯНѓ','рЯІЄ','вЬ®','рЯТЫ'];
  for(var i=0;i<n;i++){(function(){
    var el=document.createElement('div'); el.className='confetti';
    el.textContent=icons[Math.floor(Math.random()*icons.length)];
    el.style.left=(Math.random()*100)+'vw';
    var dur=2+Math.random()*1.8; el.style.animationDuration=dur+'s';
    el.style.fontSize=(18+Math.random()*18)+'px';
    document.body.appendChild(el); setTimeout(function(){el.remove();},dur*1000+200);
  })();}
}

/* ===================== Tastatur (Computer) ===================== */
document.addEventListener('keydown',function(e){
  var gameOn=!document.getElementById('screen-game').classList.contains('hide');
  var boardOn=!document.getElementById('screen-board').classList.contains('hide');
  if(!gameOn&&!boardOn)return;
  if(e.key>='0'&&e.key<='9')press(e.key);
  else if(e.key==='Backspace'){e.preventDefault();backspace();}
  else if(e.key==='Enter')check();
});

/* ===================== Init ===================== */
document.getElementById('menuTeddy').innerHTML=teddy('idle');
</script>
